<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Body Padding Preservation</title>
    <style>
      html,
      body {
        margin: 0;
        width: 960px;
        height: 540px;
        overflow: hidden;
      }

      body {
        box-sizing: border-box;
        padding: 40px;
        background: #111111;
      }

      .surface {
        width: 100%;
        height: 100%;
        background: #e65000;
      }
    </style>
  </head>
  <body>
    <div class="surface"></div>
  </body>
</html>
