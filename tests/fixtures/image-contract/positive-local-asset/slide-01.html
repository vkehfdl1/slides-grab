<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #f5f7fb;
      color: #0f172a;
    }
    .slide {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 260pt 1fr;
      gap: 28pt;
      padding: 32pt;
    }
    .panel {
      background: #ffffff;
      border: 1pt solid #dbe4f0;
      border-radius: 18pt;
      padding: 18pt;
    }
    img {
      display: block;
      width: 100%;
      height: 168pt;
      object-fit: cover;
      border-radius: 12pt;
      background: #e2e8f0;
    }
    h1 {
      margin: 0 0 12pt 0;
      font-size: 24pt;
      line-height: 1.2;
    }
    p {
      margin: 0;
      font-size: 12pt;
      line-height: 1.6;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="panel">
      <img src="./assets/example.svg" alt="Sample contract illustration">
    </div>
    <div class="panel">
      <h1>Local Asset Contract</h1>
      <p>This slide uses the canonical local asset pattern with an image stored under ./assets/ and referenced from slide-01.html.</p>
    </div>
  </div>
</body>
</html>
