<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      width: 720pt;
      height: 405pt;
      font-family: sans-serif;
    }
    body {
      background-image: url("./assets/missing-background.svg");
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;

    .card {
      width: 320pt;
      padding: 20pt;
      border-radius: 18pt;
      background: rgba(255, 255, 255, 0.92);
    }
    h1 {
      margin: 0 0 10pt 0;
      font-size: 24pt;
    }
    p {
      margin: 0;
      font-size: 12pt;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Missing Body Background Asset</h1>
    <p>This slide intentionally points the body background-image at a missing ./assets file.</p>
  </div>

</html>
