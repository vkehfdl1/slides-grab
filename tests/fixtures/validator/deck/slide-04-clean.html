<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Clean Fixture</title>
    <style>
      html,
      body {
        margin: 0;
        width: 960px;
        height: 540px;
      }

      body {
        position: relative;
        overflow: hidden;
        background: #f7f7f7;
        font-family: sans-serif;
      }

      div.card {
        position: absolute;
        left: 120px;
        top: 100px;
        width: 320px;
        height: 180px;
        padding: 24px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0;
        font-size: 20px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Validator Fixture</h1>
      <p>This slide should pass without warnings.</p>
    </div>
  </body>
</html>
