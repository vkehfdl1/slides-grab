<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deck Browser - slides-grab-studio</title>
  <link rel="icon" type="image/png" href="/asset/buddy_logo_round.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="/browser.css">
  <script>(function(){var t=localStorage.getItem('sg-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: light)').matches)document.documentElement.setAttribute('data-theme','light')})();</script>
</head>
<body>
  <div class="browser-container">
    <div class="nav-bar">
      <div class="nav-brand"><img class="logo-dark" src="/asset/buddy_logo_round(dark).png" alt=""><img class="logo-light" src="/asset/buddy_logo_round(light).png" alt=""><span class="nav-brand-text">slides-grab<span>-studio</span></span></div>
      <div class="nav-spacer"></div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle light/dark mode">
        <svg class="theme-icon theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-icon theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button class="btn-new-deck" id="btn-new-deck">+ New Deck</button>
    </div>

    <div class="main-content" id="main-content">
      <div class="search-bar">
        <label for="search-input" class="sr-only">Search decks</label>
        <input class="search-input" id="search-input" type="text" placeholder="Search decks..." autocomplete="off">
      </div>
      <div id="deck-container">
        <div class="loading">
          <div class="loading-spinner"></div>
          Loading decks...
        </div>
      </div>
    </div>

    <div class="status-bar" id="status-bar">Loading...</div>

    <!-- Rename Modal -->
    <div class="deck-modal-overlay" id="rename-modal" hidden>
      <div class="deck-modal">
        <h3>Rename Deck</h3>
        <input class="deck-rename-input" id="rename-input" type="text" autocomplete="off" placeholder="New name...">
        <div class="deck-rename-error" id="rename-error"></div>
        <div class="deck-modal-actions">
          <button class="btn-modal-cancel" id="rename-cancel">Cancel</button>
          <button class="btn-modal-confirm" id="rename-confirm">Rename</button>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="deck-modal-overlay" id="delete-modal" hidden>
      <div class="deck-modal">
        <h3>Delete Deck</h3>
        <p>Are you sure you want to delete <strong id="delete-deck-name"></strong>? This action cannot be undone.</p>
        <div class="deck-modal-actions">
          <button class="btn-modal-cancel" id="delete-cancel">Cancel</button>
          <button class="btn-modal-danger" id="delete-confirm">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    const deckContainer = document.getElementById('deck-container');
    const searchInput = document.getElementById('search-input');
    const statusBar = document.getElementById('status-bar');
    const btnNewDeck = document.getElementById('btn-new-deck');

    let allDecks = [];
    let renamingDeck = null;
    let deletingDeck = null;

    function timeAgo(dateStr) {
      const now = Date.now();
      const then = new Date(dateStr).getTime();
      const diffSec = Math.floor((now - then) / 1000);
      if (diffSec < 60) return 'just now';
      const diffMin = Math.floor(diffSec / 60);
      if (diffMin < 60) return `${diffMin}m ago`;
      const diffHour = Math.floor(diffMin / 60);
      if (diffHour < 24) return `${diffHour}h ago`;
      const diffDay = Math.floor(diffHour / 24);
      if (diffDay < 30) return `${diffDay}d ago`;
      const diffMonth = Math.floor(diffDay / 30);
      if (diffMonth < 12) return `${diffMonth}mo ago`;
      return `${Math.floor(diffMonth / 12)}y ago`;
    }

    function renderDecks(decks) {
      if (decks.length === 0 && allDecks.length === 0) {
        deckContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
            </div>
            <div class="empty-state-title">No decks yet</div>
            <div class="empty-state-desc">Create your first presentation to get started.</div>
            <button class="btn-new-deck" onclick="navigateCreate()">+ New Deck</button>
          </div>
        `;
        return;
      }

      if (decks.length === 0) {
        deckContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-title">No matches</div>
            <div class="empty-state-desc">No decks match your search.</div>
          </div>
        `;
        return;
      }

      let html = '<div class="deck-grid">';

      for (const deck of decks) {
        const thumbUrl = `/api/decks/${encodeURIComponent(deck.name)}/thumbnail`;
        html += `
          <div class="deck-card" data-deck="${deck.name}" role="button" tabindex="0">
            <div class="deck-card-actions">
              <button class="deck-kebab-btn" data-deck="${deck.name}" title="More actions" aria-label="More actions">&#8942;</button>
            </div>
            <div class="deck-thumb">
              <img src="${thumbUrl}" loading="lazy" alt="${deck.name}"
                   onerror="this.style.display='none'; this.nextElementSibling.style.display='';">
              <span class="deck-thumb-placeholder" style="display:none;">No preview</span>
            </div>
            <div class="deck-info">
              <div class="deck-name" title="${deck.name}">${deck.name}</div>
              <div class="deck-meta">
                <span class="deck-meta-item">${deck.slideCount} slides</span>
                <span class="deck-meta-item">${timeAgo(deck.lastModified)}</span>
                ${deck.hasOutline ? '<span class="deck-badge">outline</span>' : ''}
              </div>
            </div>
          </div>
        `;
      }

      html += `
        <div class="deck-card new-deck-card" id="card-new-deck" role="button" tabindex="0">
          <div class="new-deck-inner">
            <div class="new-deck-icon">+</div>
            <div class="new-deck-label">New Deck</div>
          </div>
        </div>
      `;

      html += '</div>';
      deckContainer.innerHTML = html;

      // Event listeners
      for (const card of deckContainer.querySelectorAll('.deck-card:not(.new-deck-card)')) {
        card.addEventListener('click', () => navigateToDeck(card.dataset.deck));
        card.addEventListener('keydown', (e) => { if (e.key === 'Enter') navigateToDeck(card.dataset.deck); });
        const kebab = card.querySelector('.deck-kebab-btn');
        if (kebab) kebab.addEventListener('click', (e) => { e.stopPropagation(); openKebabMenu(e, card.dataset.deck); });
      }

      const newDeckCard = document.getElementById('card-new-deck');
      if (newDeckCard) {
        newDeckCard.addEventListener('click', navigateCreate);
        newDeckCard.addEventListener('keydown', (e) => { if (e.key === 'Enter') navigateCreate(); });
      }
    }

    function navigateToDeck(deckName) {
      window.location.href = `/editor?deck=${encodeURIComponent(deckName)}`;
    }

    window.navigateCreate = function navigateCreate() {
      window.location.href = '/editor?create=1';
    };

    // Search
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();
      const filtered = query
        ? allDecks.filter((d) => d.name.toLowerCase().includes(query))
        : allDecks;
      renderDecks(filtered);
      statusBar.textContent = query
        ? `${filtered.length} of ${allDecks.length} decks`
        : `${allDecks.length} decks`;
    });

    // New Deck button (nav bar)
    btnNewDeck.addEventListener('click', navigateCreate);

    // ── Kebab menu ──
    function closeKebabMenu() {
      const existing = document.querySelector('.deck-action-menu');
      if (existing) existing.remove();
    }

    function openKebabMenu(e, deckName) {
      closeKebabMenu();
      const btn = e.currentTarget;
      const rect = btn.getBoundingClientRect();
      const menu = document.createElement('div');
      menu.className = 'deck-action-menu';
      menu.innerHTML = `
        <button class="deck-action-item" data-action="rename">Rename</button>
        <button class="deck-action-item" data-action="duplicate">Duplicate</button>
        <button class="deck-action-item danger" data-action="delete">Delete</button>
      `;
      menu.style.top = `${rect.bottom + 4}px`;
      menu.style.left = `${rect.right - 140}px`;
      document.body.appendChild(menu);

      menu.querySelector('[data-action="rename"]').addEventListener('click', () => { closeKebabMenu(); openRenameModal(deckName); });
      menu.querySelector('[data-action="duplicate"]').addEventListener('click', () => { closeKebabMenu(); duplicateDeck(deckName); });
      menu.querySelector('[data-action="delete"]').addEventListener('click', () => { closeKebabMenu(); openDeleteModal(deckName); });

      const onClickOutside = (ev) => {
        if (!menu.contains(ev.target) && ev.target !== btn) {
          closeKebabMenu();
          document.removeEventListener('click', onClickOutside, true);
        }
      };
      setTimeout(() => document.addEventListener('click', onClickOutside, true), 0);
    }

    // ── Duplicate ──
    async function duplicateDeck(deckName) {
      statusBar.textContent = 'Duplicating...';
      try {
        const res = await fetch(`/api/decks/${encodeURIComponent(deckName)}/duplicate`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) { alert(data.error || 'Duplicate failed.'); return; }
        await loadDecks();
      } catch (err) {
        alert(err.message);
      }
    }

    // ── Rename modal ──
    const renameModal = document.getElementById('rename-modal');
    const renameInput = document.getElementById('rename-input');
    const renameError = document.getElementById('rename-error');
    const renameConfirmBtn = document.getElementById('rename-confirm');

    function openRenameModal(deckName) {
      renamingDeck = deckName;
      renameInput.value = deckName;
      renameError.textContent = '';
      renameConfirmBtn.disabled = false;
      renameModal.hidden = false;
      setTimeout(() => { renameInput.focus(); renameInput.select(); }, 50);
    }

    function closeRenameModal() {
      renameModal.hidden = true;
      renamingDeck = null;
    }

    async function submitRename() {
      const newName = renameInput.value.trim();
      if (!newName) { renameError.textContent = 'Name cannot be empty.'; return; }
      if (newName === renamingDeck) { closeRenameModal(); return; }
      renameError.textContent = '';
      renameConfirmBtn.disabled = true;
      try {
        const res = await fetch(`/api/decks/${encodeURIComponent(renamingDeck)}/rename`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newName }),
        });
        const data = await res.json();
        if (!res.ok) { renameError.textContent = data.error || 'Rename failed.'; renameConfirmBtn.disabled = false; return; }
        closeRenameModal();
        await loadDecks();
      } catch (err) {
        renameError.textContent = err.message;
        renameConfirmBtn.disabled = false;
      }
    }

    document.getElementById('rename-cancel').addEventListener('click', closeRenameModal);
    renameConfirmBtn.addEventListener('click', submitRename);
    renameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitRename(); });
    renameModal.addEventListener('click', (e) => { if (e.target === renameModal) closeRenameModal(); });

    // ── Delete modal ──
    const deleteModal = document.getElementById('delete-modal');
    const deleteDeckNameEl = document.getElementById('delete-deck-name');
    const deleteConfirmBtn = document.getElementById('delete-confirm');

    function openDeleteModal(deckName) {
      deletingDeck = deckName;
      deleteDeckNameEl.textContent = deckName;
      deleteConfirmBtn.disabled = false;
      deleteModal.hidden = false;
    }

    function closeDeleteModal() {
      deleteModal.hidden = true;
      deletingDeck = null;
    }

    async function submitDelete() {
      deleteConfirmBtn.disabled = true;
      try {
        const res = await fetch(`/api/decks/${encodeURIComponent(deletingDeck)}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) { alert(data.error || 'Delete failed.'); deleteConfirmBtn.disabled = false; return; }
        closeDeleteModal();
        await loadDecks();
      } catch (err) {
        alert(err.message);
        deleteConfirmBtn.disabled = false;
      }
    }

    document.getElementById('delete-cancel').addEventListener('click', closeDeleteModal);
    deleteConfirmBtn.addEventListener('click', submitDelete);
    deleteModal.addEventListener('click', (e) => { if (e.target === deleteModal) closeDeleteModal(); });

    // ── Global keyboard ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeKebabMenu();
        if (!renameModal.hidden) closeRenameModal();
        if (!deleteModal.hidden) closeDeleteModal();
      }
    });

    // Load decks
    async function loadDecks() {
      try {
        const res = await fetch('/api/decks');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allDecks = await res.json();
        renderDecks(allDecks);
        statusBar.textContent = `${allDecks.length} decks`;
      } catch (err) {
        deckContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-title">Failed to load decks</div>
            <div class="empty-state-desc">${err.message}</div>
          </div>
        `;
        statusBar.textContent = 'Error loading decks';
      }
    }

    loadDecks();

    // ── Theme toggle ──
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('sg-theme', next);
    });
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
      if (!localStorage.getItem('sg-theme')) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'light' : 'dark');
      }
    });
  </script>
</body>
</html>
