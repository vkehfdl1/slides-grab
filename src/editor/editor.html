<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Editor - ppt-agent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    .editor-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .nav-bar {
      height: 48px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-bar button {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .nav-bar button:hover { background: #555; }
    .nav-bar button:disabled { opacity: 0.3; cursor: default; }
    .nav-bar button:disabled:hover { background: #333; }

    .slide-counter {
      color: #aaa;
      font-size: 14px;
      font-weight: 500;
      min-width: 60px;
      text-align: center;
    }

    .nav-spacer { flex: 1; }

    .slide-status-chip {
      margin-right: 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      text-transform: uppercase;
    }

    .slide-status-chip.idle {
      color: #a3a3a3;
      background: #232323;
      border-color: #2f2f2f;
    }

    .slide-status-chip.running {
      color: #facc15;
      background: #352b10;
      border-color: #5a4718;
    }

    .slide-status-chip.success {
      color: #22c55e;
      background: #122c1c;
      border-color: #1d4630;
    }

    .slide-status-chip.failed {
      color: #ef4444;
      background: #361516;
      border-color: #5a2325;
    }

    .brand {
      color: #555;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .slide-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-width: 0;
      overflow: hidden;
      background: #111;
    }

    .slide-wrapper {
      position: relative;
      width: 960px;
      height: 540px;
      transform-origin: center center;
    }

    .slide-wrapper iframe {
      width: 960px;
      height: 540px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #fff;
      display: block;
      position: relative;
      z-index: 1;
    }

    .bbox-layer {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
    }

    .draw-layer {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: auto;
      cursor: crosshair;
    }

    .draw-box {
      position: absolute;
      border: 2px dashed #ef4444;
      background: rgba(239, 68, 68, 0.1);
      display: none;
      pointer-events: none;
    }

    .bbox-item {
      position: absolute;
      border: 2px solid #ef4444;
      background: rgba(239, 68, 68, 0.14);
      pointer-events: auto;
      cursor: pointer;
      transition: border-color 0.12s ease;
    }

    .bbox-item.pending:hover {
      border-color: #dc2626;
    }

    .bbox-item.review {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.14);
    }

    .bbox-item.review:hover {
      border-color: #16a34a;
    }

    .bbox-item.selected {
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.22);
    }

    .bbox-index {
      position: absolute;
      top: -14px;
      left: -2px;
      min-width: 18px;
      height: 16px;
      padding: 0 4px;
      border-radius: 3px;
      background: #b91c1c;
      color: #fff;
      font-size: 11px;
      line-height: 16px;
      text-align: center;
      font-weight: 700;
    }

    .bbox-item.review .bbox-index {
      background: #166534;
    }

    .bbox-actions {
      display: none;
      position: absolute;
      top: -30px;
      right: -2px;
      align-items: center;
      gap: 6px;
    }

    .bbox-item.selected .bbox-actions {
      display: inline-flex;
    }

    .bbox-action-btn {
      border-radius: 6px;
      border: 1px solid transparent;
      height: 24px;
      padding: 0 8px;
      color: #fff;
      font-size: 11px;
      line-height: 22px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .bbox-delete {
      border-radius: 999px;
      border: 1px solid #7f1d1d;
      background: #ef4444;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      width: 24px;
      padding: 0;
      line-height: 22px;
    }

    .bbox-check {
      border-color: #14532d;
      background: #16a34a;
    }

    .bbox-rerun {
      border-color: #78350f;
      background: #f59e0b;
      color: #111827;
    }

    .bbox-item.pending .bbox-check,
    .bbox-item.pending .bbox-rerun {
      display: none;
    }

    .bbox-item.review .bbox-delete {
      display: none;
    }

    .bbox-item.pending.selected .bbox-delete {
      display: block;
    }

    .clear-overlay-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 12;
      border: 1px solid #4b5563;
      background: rgba(17, 24, 39, 0.88);
      color: #f3f4f6;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .clear-overlay-btn:hover {
      background: rgba(31, 41, 55, 0.95);
    }

    .clear-overlay-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .clear-overlay-btn:disabled:hover {
      background: rgba(17, 24, 39, 0.88);
    }

    .sidebar {
      width: 430px;
      min-width: 340px;
      border-left: 1px solid #333;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .chat-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      border-bottom: 1px solid #333;
      font-size: 13px;
      font-weight: 600;
      color: #d1d5db;
    }

    .chat-messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #151515;
    }

    .chat-messages:empty::before {
      content: 'Prompt history appears here.';
      color: #666;
      font-size: 12px;
      font-style: italic;
    }

    .message {
      border: 1px solid #2f2f2f;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
      color: #d1d5db;
      white-space: pre-wrap;
    }

    .message.user {
      border-color: #1d4ed8;
      background: rgba(37, 99, 235, 0.13);
    }

    .message.system {
      border-color: #355a37;
      background: rgba(22, 163, 74, 0.12);
    }

    .message.error {
      border-color: #7f1d1d;
      background: rgba(239, 68, 68, 0.12);
    }

    .composer {
      border-top: 1px solid #333;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #1a1a1a;
    }

    .tool-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .btn:disabled:hover {
      filter: none;
    }

    .bbox-count {
      color: #9ca3af;
      font-size: 12px;
      font-weight: 600;
      margin-left: auto;
    }

    .prompt-input {
      width: 100%;
      min-height: 84px;
      max-height: 200px;
      resize: vertical;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #e5e7eb;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.45;
      padding: 10px;
      outline: none;
    }

    .prompt-input:focus {
      border-color: #666;
    }

    .prompt-input::placeholder {
      color: #666;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hint {
      color: #6b7280;
      font-size: 11px;
    }

    .model-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 auto;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
    }

    .model-label {
      color: #9ca3af;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .model-select {
      flex: 1 1 180px;
      min-width: 120px;
      width: auto;
      height: 30px;
      border-radius: 6px;
      border: 1px solid #3f3f46;
      background: #202020;
      color: #e5e7eb;
      font-size: 12px;
      font-family: inherit;
      padding: 0 8px;
      outline: none;
    }

    .model-select:focus {
      border-color: #64748b;
    }

    .btn-send {
      background: #2563eb;
      color: #fff;
      min-width: 108px;
      flex: 0 0 auto;
    }

    .btn-send:hover { background: #3b82f6; }

    .runs-section {
      border-top: 1px solid #333;
      padding: 10px;
      background: #141414;
      max-height: 36%;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-label {
      color: #9ca3af;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .runs-list {
      overflow-y: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .run-item {
      border: 1px solid #2f2f2f;
      border-radius: 8px;
      padding: 8px;
      background: #1c1c1c;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .run-item-head {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #d1d5db;
    }

    .run-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .run-dot.running { background: #facc15; }
    .run-dot.success { background: #22c55e; }
    .run-dot.failed { background: #ef4444; }
    .run-dot.idle { background: #6b7280; }

    .run-slide {
      color: #e5e7eb;
      font-weight: 600;
      word-break: break-all;
    }

    .run-meta {
      color: #9ca3af;
      font-size: 11px;
    }

    .run-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
    }

    .btn-log {
      background: #333;
      color: #fff;
      font-size: 11px;
      padding: 5px 8px;
    }

    .btn-log:hover { background: #454545; }

    .run-log {
      white-space: pre-wrap;
      background: #101010;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      line-height: 1.45;
      color: #d1d5db;
      max-height: 180px;
      overflow: auto;
    }

    .status-bar {
      height: 28px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      color: #555;
      flex-shrink: 0;
      gap: 16px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #555;
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }

    .status-message {
      flex: 1;
      text-align: right;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="nav-bar">
      <div class="nav-controls">
        <button id="btn-prev" title="Previous slide (Left arrow)">&#9664; Prev</button>
        <span class="slide-counter" id="slide-counter">-- / --</span>
        <button id="btn-next" title="Next slide (Right arrow)">Next &#9654;</button>
      </div>
      <div class="nav-spacer"></div>
      <span class="slide-status-chip idle" id="slide-status-chip">idle</span>
      <span class="brand">ppt-agent</span>
    </div>

    <div class="main-content">
      <div class="slide-panel" id="slide-panel">
        <div class="slide-wrapper" id="slide-wrapper">
          <button class="clear-overlay-btn" id="btn-clear-bboxes" title="Clear all boxes on current slide">Clear Boxes</button>
          <iframe id="slide-iframe" sandbox="allow-same-origin allow-scripts" loading="eager"></iframe>
          <div class="bbox-layer" id="bbox-layer"></div>
          <div class="draw-layer" id="draw-layer">
            <div class="draw-box" id="draw-box"></div>
          </div>
        </div>
      </div>

      <aside class="sidebar">
        <section class="chat-section">
          <div class="chat-header">Slide Chat</div>
          <div class="chat-messages" id="chat-messages"></div>

          <div class="composer">
            <div class="tool-row">
              <span class="hint">Drag on the slide to add red pending bboxes.</span>
              <span class="bbox-count" id="bbox-count">0 pending · 0 review</span>
            </div>
            <textarea id="prompt-input" class="prompt-input" placeholder="Describe the edit for this slide..."></textarea>
            <div class="composer-actions">
              <div class="model-control">
                <span class="hint">Cmd/Ctrl+Enter to run</span>
                <label class="model-label" for="model-select">Model</label>
                <select id="model-select" class="model-select">
                  <option value="gpt-5.3-codex">gpt-5.3-codex</option>
                  <option value="gpt-5.3-codex-spark">gpt-5.3-codex-spark</option>
                </select>
              </div>
              <button class="btn btn-send" id="btn-send">Run Codex</button>
            </div>
          </div>
        </section>

        <section class="runs-section">
          <div class="section-label">Execution Records</div>
          <div class="runs-list" id="runs-list"></div>
        </section>
      </aside>
    </div>

    <div class="status-bar">
      <span>
        <span class="status-dot" id="status-dot"></span>
        <span id="status-connection">Connecting...</span>
      </span>
      <span class="status-message" id="status-message"></span>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------------------
    // State
    // -------------------------------------------------------------------------
    let slides = [];
    let currentIndex = 0;
    let drawStart = null;
    let drawing = false;

    const slideStates = new Map();
    const activeRunBySlide = new Map();
    const pendingRequestBySlide = new Set();

    const runsById = new Map();
    const runLogsById = new Map();
    let expandedRunId = null;

    const chatMessages = [];

    const SLIDE_W = 960;
    const SLIDE_H = 540;
    const DEFAULT_MODELS = ['gpt-5.3-codex', 'gpt-5.3-codex-spark'];
    let availableModels = DEFAULT_MODELS.slice();
    let selectedModel = DEFAULT_MODELS[0];

    // -------------------------------------------------------------------------
    // DOM refs
    // -------------------------------------------------------------------------
    const $ = (sel) => document.querySelector(sel);
    const btnPrev = $('#btn-prev');
    const btnNext = $('#btn-next');
    const slideCounter = $('#slide-counter');
    const slideStatusChip = $('#slide-status-chip');

    const slideIframe = $('#slide-iframe');
    const slidePanel = $('#slide-panel');
    const slideWrapper = $('#slide-wrapper');
    const bboxLayer = $('#bbox-layer');
    const drawLayer = $('#draw-layer');
    const drawBox = $('#draw-box');

    const chatMessagesEl = $('#chat-messages');
    const promptInput = $('#prompt-input');
    const modelSelect = $('#model-select');
    const btnClearBboxes = $('#btn-clear-bboxes');
    const bboxCountEl = $('#bbox-count');
    const btnSend = $('#btn-send');

    const runsListEl = $('#runs-list');

    const statusDot = $('#status-dot');
    const statusConn = $('#status-connection');
    const statusMsg = $('#status-message');

    // -------------------------------------------------------------------------
    // Utils
    // -------------------------------------------------------------------------
    function setStatus(message) {
      statusMsg.textContent = message;
    }

    function currentSlideFile() {
      return slides[currentIndex] || null;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatTime(iso) {
      if (!iso) return '-';
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return iso;
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function randomId(prefix) {
      return `${prefix}-${Date.now()}-${Math.floor(Math.random() * 100000)}`;
    }

    function normalizeModelName(value) {
      return typeof value === 'string' ? value.trim() : '';
    }

    function loadSavedModel() {
      try {
        return normalizeModelName(window.localStorage.getItem('ppt-agent-editor-model'));
      } catch {
        return '';
      }
    }

    function saveSelectedModel(model) {
      try {
        window.localStorage.setItem('ppt-agent-editor-model', model);
      } catch {
        // ignore
      }
    }

    function setModelOptions(models, preferredModel = '') {
      const list = Array.isArray(models)
        ? models
          .map((name) => normalizeModelName(name))
          .filter((name) => name !== '')
        : [];
      const uniqueModels = Array.from(new Set(list));

      availableModels = uniqueModels.length > 0 ? uniqueModels : DEFAULT_MODELS.slice();

      const preferred = normalizeModelName(preferredModel);
      const saved = loadSavedModel();

      if (availableModels.includes(preferred)) {
        selectedModel = preferred;
      } else if (availableModels.includes(saved)) {
        selectedModel = saved;
      } else {
        selectedModel = availableModels[0];
      }

      modelSelect.innerHTML = availableModels
        .map((name) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`)
        .join('');
      modelSelect.value = selectedModel;
      saveSelectedModel(selectedModel);
    }

    async function loadModelOptions() {
      const saved = loadSavedModel();

      try {
        const res = await fetch('/api/models');
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const payload = await res.json();
        const serverModels = Array.isArray(payload.models) ? payload.models : [];
        const serverDefault = normalizeModelName(payload.defaultModel);

        setModelOptions(serverModels, saved || serverDefault);
      } catch {
        setModelOptions(DEFAULT_MODELS, saved);
      }
    }

    function normalizeBoxStatus(status) {
      return status === 'review' ? 'review' : 'pending';
    }

    function getSlideState(slide) {
      if (!slideStates.has(slide)) {
        slideStates.set(slide, {
          prompt: '',
          boxes: [],
          selectedBoxId: null,
        });
      }
      return slideStates.get(slide);
    }

    function getLatestRunForSlide(slide) {
      const runs = Array.from(runsById.values())
        .filter((run) => run.slide === slide)
        .sort((a, b) => String(b.startedAt).localeCompare(String(a.startedAt)));
      return runs[0] || null;
    }

    // -------------------------------------------------------------------------
    // Chat / Runs UI
    // -------------------------------------------------------------------------
    function addChatMessage(kind, text) {
      chatMessages.push({
        id: randomId('msg'),
        kind,
        text,
        at: new Date().toISOString(),
      });

      while (chatMessages.length > 80) {
        chatMessages.shift();
      }

      renderChatMessages();
    }

    function renderChatMessages() {
      if (chatMessages.length === 0) {
        chatMessagesEl.innerHTML = '';
        return;
      }

      chatMessagesEl.innerHTML = chatMessages
        .map((msg) => {
          const time = formatTime(msg.at);
          return [
            `<div class="message ${msg.kind}">`,
            `${escapeHtml(msg.text)}`,
            `<div class="run-meta" style="margin-top:6px;">${time}</div>`,
            '</div>',
          ].join('');
        })
        .join('');

      chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
    }

    async function toggleRunLog(runId) {
      if (expandedRunId === runId) {
        expandedRunId = null;
        renderRunsList();
        return;
      }

      expandedRunId = runId;

      if (!runLogsById.has(runId)) {
        try {
          const res = await fetch(`/api/runs/${encodeURIComponent(runId)}/log`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const text = await res.text();
          runLogsById.set(runId, text || '(empty log)');
        } catch (error) {
          runLogsById.set(runId, `Failed to load log: ${error.message}`);
        }
      }

      renderRunsList();
    }

    function renderRunsList() {
      const runs = Array.from(runsById.values())
        .sort((a, b) => String(b.startedAt).localeCompare(String(a.startedAt)))
        .slice(0, 60);

      if (runs.length === 0) {
        runsListEl.innerHTML = '<div class="run-meta">No runs yet.</div>';
        return;
      }

      runsListEl.innerHTML = runs
        .map((run) => {
          const statusClass = run.status || 'idle';
          const isExpanded = expandedRunId === run.runId;
          const logText = isExpanded
            ? escapeHtml(runLogsById.get(run.runId) || run.logPreview || '(no log)')
            : '';

          return [
            `<div class="run-item">`,
            `<div class="run-item-head">`,
            `<span class="run-dot ${statusClass}"></span>`,
            `<span class="run-slide">${escapeHtml(run.slide)}</span>`,
            `</div>`,
            `<div class="run-meta">${escapeHtml(run.status || 'idle')} | ${formatTime(run.startedAt)}</div>`,
            `<div class="run-meta">model: ${escapeHtml(run.model || '-')}</div>`,
            `<div class="run-meta">${escapeHtml(run.message || '')}</div>`,
            `<div class="run-actions">`,
            `<span class="run-meta">runId: ${escapeHtml(run.runId)}</span>`,
            `<button class="btn btn-log" data-run-log-btn="${escapeHtml(run.runId)}">${isExpanded ? 'Hide Log' : 'View Log'}</button>`,
            `</div>`,
            isExpanded ? `<div class="run-log">${logText}</div>` : '',
            `</div>`,
          ].join('');
        })
        .join('');
    }

    runsListEl.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-run-log-btn]');
      if (!button) return;
      const runId = button.getAttribute('data-run-log-btn');
      if (!runId) return;
      await toggleRunLog(runId);
    });

    // -------------------------------------------------------------------------
    // Slide & bbox rendering
    // -------------------------------------------------------------------------
    function scaleSlide() {
      const padX = 48;
      const padY = 48;
      const availW = slidePanel.clientWidth - padX;
      const availH = slidePanel.clientHeight - padY;
      if (availW <= 0 || availH <= 0) return;

      const scale = Math.min(availW / SLIDE_W, availH / SLIDE_H) * 0.95;
      slideWrapper.style.transform = `scale(${scale})`;
    }

    function renderBboxes() {
      const slide = currentSlideFile();
      if (!slide) {
        bboxLayer.innerHTML = '';
        bboxCountEl.textContent = '0 pending · 0 review';
        return;
      }

      const state = getSlideState(slide);
      bboxLayer.innerHTML = state.boxes
        .map((box, index) => {
          const statusClass = normalizeBoxStatus(box.status);
          const selectedClass = box.id === state.selectedBoxId ? 'selected' : '';
          return [
            `<div class="bbox-item ${statusClass} ${selectedClass}" data-box-id="${escapeHtml(box.id)}" style="left:${box.x}px;top:${box.y}px;width:${box.width}px;height:${box.height}px;">`,
            `<div class="bbox-index">${index + 1}</div>`,
            `<div class="bbox-actions">`,
            `<button class="bbox-action-btn bbox-delete" data-box-delete="${escapeHtml(box.id)}" title="Delete bbox">×</button>`,
            `<button class="bbox-action-btn bbox-check" data-box-check="${escapeHtml(box.id)}" title="Confirm bbox">Check</button>`,
            `<button class="bbox-action-btn bbox-rerun" data-box-rerun="${escapeHtml(box.id)}" title="Mark bbox pending">Rerun</button>`,
            `</div>`,
            `</div>`,
          ].join('');
        })
        .join('');

      const pendingCount = state.boxes.filter((box) => normalizeBoxStatus(box.status) === 'pending').length;
      const reviewCount = state.boxes.length - pendingCount;
      bboxCountEl.textContent = `${pendingCount} pending · ${reviewCount} review`;
      updateSendState();
    }

    function clientToSlidePoint(clientX, clientY) {
      const rect = drawLayer.getBoundingClientRect();
      const relX = clamp((clientX - rect.left) / rect.width, 0, 1);
      const relY = clamp((clientY - rect.top) / rect.height, 0, 1);
      return {
        x: Math.round(relX * SLIDE_W),
        y: Math.round(relY * SLIDE_H),
      };
    }

    function startDrawing(event) {
      if (event.button !== 0) return;
      event.preventDefault();

      drawing = true;
      drawStart = clientToSlidePoint(event.clientX, event.clientY);
      drawBox.style.display = 'block';
      drawBox.style.left = `${drawStart.x}px`;
      drawBox.style.top = `${drawStart.y}px`;
      drawBox.style.width = '1px';
      drawBox.style.height = '1px';
    }

    function moveDrawing(event) {
      if (!drawing || !drawStart) return;
      const current = clientToSlidePoint(event.clientX, event.clientY);

      const x = Math.min(drawStart.x, current.x);
      const y = Math.min(drawStart.y, current.y);
      const width = Math.max(1, Math.abs(current.x - drawStart.x));
      const height = Math.max(1, Math.abs(current.y - drawStart.y));

      drawBox.style.left = `${x}px`;
      drawBox.style.top = `${y}px`;
      drawBox.style.width = `${width}px`;
      drawBox.style.height = `${height}px`;
    }

    function endDrawing(event) {
      if (!drawing || !drawStart) return;

      const slide = currentSlideFile();
      if (!slide) return;

      const current = clientToSlidePoint(event.clientX, event.clientY);

      const x = Math.min(drawStart.x, current.x);
      const y = Math.min(drawStart.y, current.y);
      const width = Math.max(1, Math.abs(current.x - drawStart.x));
      const height = Math.max(1, Math.abs(current.y - drawStart.y));

      drawBox.style.display = 'none';
      drawing = false;
      drawStart = null;

      if (width < 3 || height < 3) return;

      const state = getSlideState(slide);
      const newBox = {
        id: randomId('bbox'),
        x,
        y,
        width,
        height,
        status: 'pending',
      };

      state.boxes.push(newBox);
      state.selectedBoxId = newBox.id;
      renderBboxes();
      setStatus(`Added bbox #${state.boxes.length} for ${slide}.`);
    }

    function clearBboxesForCurrentSlide() {
      const slide = currentSlideFile();
      if (!slide) return;

      const state = getSlideState(slide);
      state.boxes = [];
      state.selectedBoxId = null;
      renderBboxes();
      setStatus('All bounding boxes cleared for current slide.');
    }

    bboxLayer.addEventListener('click', (event) => {
      const slide = currentSlideFile();
      if (!slide) return;

      const state = getSlideState(slide);
      const checkButton = event.target.closest('[data-box-check]');
      if (checkButton) {
        const boxId = checkButton.getAttribute('data-box-check');
        state.boxes = state.boxes.filter((box) => box.id !== boxId);
        if (state.selectedBoxId === boxId) state.selectedBoxId = null;
        renderBboxes();
        setStatus('BBox confirmed and cleared.');
        event.stopPropagation();
        return;
      }

      const rerunButton = event.target.closest('[data-box-rerun]');
      if (rerunButton) {
        const boxId = rerunButton.getAttribute('data-box-rerun');
        const box = state.boxes.find((item) => item.id === boxId);
        if (box) box.status = 'pending';
        state.selectedBoxId = boxId;
        renderBboxes();
        setStatus('BBox moved back to pending (red).');
        event.stopPropagation();
        return;
      }

      const deleteButton = event.target.closest('[data-box-delete]');
      if (deleteButton) {
        const boxId = deleteButton.getAttribute('data-box-delete');
        state.boxes = state.boxes.filter((box) => box.id !== boxId);
        if (state.selectedBoxId === boxId) state.selectedBoxId = null;
        renderBboxes();
        setStatus('Bounding box deleted.');
        event.stopPropagation();
        return;
      }

      const boxEl = event.target.closest('[data-box-id]');
      if (boxEl) {
        state.selectedBoxId = boxEl.getAttribute('data-box-id');
        renderBboxes();
        return;
      }

      state.selectedBoxId = null;
      renderBboxes();
    });

    // -------------------------------------------------------------------------
    // XPath extraction
    // -------------------------------------------------------------------------
    function getXPath(el) {
      if (!el || el.nodeType !== Node.ELEMENT_NODE) return '';

      const segments = [];
      let node = el;
      while (node && node.nodeType === Node.ELEMENT_NODE) {
        const tag = node.tagName.toLowerCase();

        let index = 1;
        let sibling = node.previousElementSibling;
        while (sibling) {
          if (sibling.tagName === node.tagName) index += 1;
          sibling = sibling.previousElementSibling;
        }

        segments.unshift(`${tag}[${index}]`);
        node = node.parentElement;
      }

      return `/${segments.join('/')}`;
    }

    function intersectArea(a, b) {
      const left = Math.max(a.x, b.x);
      const top = Math.max(a.y, b.y);
      const right = Math.min(a.x + a.width, b.x + b.width);
      const bottom = Math.min(a.y + a.height, b.y + b.height);
      if (right <= left || bottom <= top) return 0;
      return (right - left) * (bottom - top);
    }

    function extractTargetsForBox(box) {
      const doc = slideIframe.contentDocument;
      if (!doc || !doc.body) return [];

      const all = Array.from(doc.body.querySelectorAll('*'));
      const candidates = [];

      for (const el of all) {
        const tag = el.tagName ? el.tagName.toLowerCase() : '';
        if (!tag || ['script', 'style', 'link', 'meta', 'noscript'].includes(tag)) continue;

        const rect = el.getBoundingClientRect();
        if (!rect || rect.width <= 1 || rect.height <= 1) continue;

        const targetBox = {
          x: rect.left,
          y: rect.top,
          width: rect.width,
          height: rect.height,
        };

        const area = intersectArea(box, targetBox);
        if (area <= 0) continue;

        const xpath = getXPath(el);
        if (!xpath) continue;

        candidates.push({
          xpath,
          tag,
          text: (el.textContent || '').replace(/\s+/g, ' ').trim().slice(0, 140),
          area,
        });
      }

      candidates.sort((a, b) => b.area - a.area);

      const dedup = [];
      const seen = new Set();
      for (const item of candidates) {
        if (seen.has(item.xpath)) continue;
        seen.add(item.xpath);
        dedup.push({ xpath: item.xpath, tag: item.tag, text: item.text });
        if (dedup.length >= 12) break;
      }

      return dedup;
    }

    // -------------------------------------------------------------------------
    // Send
    // -------------------------------------------------------------------------
    function updateSlideStatusChip() {
      const slide = currentSlideFile();
      if (!slide) {
        slideStatusChip.textContent = 'idle';
        slideStatusChip.className = 'slide-status-chip idle';
        return;
      }

      let status = 'idle';
      if (pendingRequestBySlide.has(slide)) {
        status = 'running';
      } else if (activeRunBySlide.has(slide)) {
        status = 'running';
      } else {
        const latest = getLatestRunForSlide(slide);
        if (latest?.status === 'success') status = 'success';
        if (latest?.status === 'failed') status = 'failed';
      }

      slideStatusChip.textContent = status;
      slideStatusChip.className = `slide-status-chip ${status}`;
    }

    function updateSendState() {
      const slide = currentSlideFile();
      if (!slide) {
        btnSend.disabled = true;
        btnClearBboxes.disabled = true;
        return;
      }

      const state = getSlideState(slide);
      const prompt = (promptInput.value || '').trim();
      const pendingCount = state.boxes.filter((box) => normalizeBoxStatus(box.status) === 'pending').length;
      const blocked = pendingRequestBySlide.has(slide) || activeRunBySlide.has(slide);

      btnSend.disabled = !prompt || pendingCount === 0 || blocked || !selectedModel;
      btnClearBboxes.disabled = state.boxes.length === 0 || blocked;
      updateSlideStatusChip();
    }

    async function applyChanges() {
      const slide = currentSlideFile();
      if (!slide) return;

      const state = getSlideState(slide);
      const prompt = (promptInput.value || '').trim();
      const pendingBoxes = state.boxes.filter((box) => normalizeBoxStatus(box.status) === 'pending');

      if (!prompt) return;
      if (pendingBoxes.length === 0) {
        setStatus('No pending (red) bbox to run. Draw a new box or click Rerun on a green box.');
        return;
      }

      const submittedBoxIds = pendingBoxes.map((box) => box.id);
      const submittedSet = new Set(submittedBoxIds);

      const selections = pendingBoxes.map((box) => ({
        x: box.x,
        y: box.y,
        width: box.width,
        height: box.height,
        targets: extractTargetsForBox(box),
      }));

      addChatMessage('user', `[${slide}] [${selectedModel}] ${prompt}`);

      pendingRequestBySlide.add(slide);
      state.prompt = '';
      promptInput.value = '';
      updateSendState();
      setStatus(`Submitting ${slide} to Codex...`);

      try {
        const res = await fetch('/api/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            slide,
            prompt,
            model: selectedModel,
            selections,
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          const message = data.error || `Server error ${res.status}`;
          addChatMessage('error', `[${slide}] ${message}`);
          setStatus(`Error: ${message}`);
          return;
        }

        if (data.runId) {
          const existing = runsById.get(data.runId) || {};
          runsById.set(data.runId, {
            ...existing,
            runId: data.runId,
            slide,
            status: data.success ? 'success' : 'failed',
            code: data.code,
            message: data.message,
            model: data.model || selectedModel,
            startedAt: existing.startedAt || new Date().toISOString(),
            finishedAt: new Date().toISOString(),
            logPreview: existing.logPreview || '',
          });
          renderRunsList();
        }

        addChatMessage(
          data.success ? 'system' : 'error',
          `[${slide}] ${data.message || (data.success ? 'Completed' : 'Failed')}`,
        );

        if (data.success) {
          let marked = 0;
          for (const box of state.boxes) {
            if (submittedSet.has(box.id) && normalizeBoxStatus(box.status) === 'pending') {
              box.status = 'review';
              marked += 1;
            }
          }
          renderBboxes();
          setStatus(
            marked > 0
              ? `${data.message || 'Codex run completed.'} Review ${marked} green bbox${marked === 1 ? '' : 'es'}: Check to accept or Rerun.`
              : (data.message || 'Codex run completed.'),
          );
        } else {
          setStatus(data.message || 'Codex run failed.');
        }
      } catch (error) {
        addChatMessage('error', `[${slide}] ${error.message}`);
        setStatus(`Error: ${error.message}`);
      } finally {
        pendingRequestBySlide.delete(slide);
        updateSendState();
      }
    }

    // -------------------------------------------------------------------------
    // Navigation
    // -------------------------------------------------------------------------
    function persistCurrentSlideDraft() {
      const slide = currentSlideFile();
      if (!slide) return;
      const state = getSlideState(slide);
      state.prompt = promptInput.value;
    }

    function goToSlide(index) {
      if (index < 0 || index >= slides.length) return;

      persistCurrentSlideDraft();

      currentIndex = index;
      const slide = currentSlideFile();
      slideIframe.src = `/slides/${slide}`;
      slideCounter.textContent = `${currentIndex + 1} / ${slides.length}`;
      btnPrev.disabled = currentIndex === 0;
      btnNext.disabled = currentIndex === slides.length - 1;

      const state = getSlideState(slide);
      promptInput.value = state.prompt || '';
      renderBboxes();
      updateSendState();
      setStatus(`Loaded ${slide}`);
    }

    // -------------------------------------------------------------------------
    // SSE
    // -------------------------------------------------------------------------
    function upsertRun(run) {
      if (!run?.runId) return;
      const existing = runsById.get(run.runId) || {};
      runsById.set(run.runId, {
        ...existing,
        ...run,
      });
    }

    function connectSSE() {
      const evtSource = new EventSource('/api/events');

      evtSource.onopen = () => {
        statusDot.classList.add('connected');
        statusDot.classList.remove('disconnected');
        statusConn.textContent = 'Connected';
      };

      evtSource.addEventListener('runsSnapshot', (event) => {
        try {
          const payload = JSON.parse(event.data);

          runsById.clear();
          for (const run of payload.runs || []) {
            upsertRun(run);
            if (run.logPreview) runLogsById.set(run.runId, run.logPreview);
          }

          activeRunBySlide.clear();
          for (const active of payload.activeRuns || []) {
            if (active.slide && active.runId) {
              activeRunBySlide.set(active.slide, active.runId);
            }
          }

          renderRunsList();
          updateSendState();
        } catch (error) {
          console.error('runsSnapshot parse error:', error);
        }
      });

      evtSource.addEventListener('applyStarted', (event) => {
        try {
          const payload = JSON.parse(event.data);
          activeRunBySlide.set(payload.slide, payload.runId);

          upsertRun({
            runId: payload.runId,
            slide: payload.slide,
            model: payload.model || '',
            status: 'running',
            message: `${payload.model ? `${payload.model} | ` : ''}Running (${payload.selectionsCount || 0} bbox)`,
            startedAt: new Date().toISOString(),
            logPreview: '',
          });

          addChatMessage('system', `[${payload.slide}] run started (${payload.runId})`);
          renderRunsList();
          updateSendState();
        } catch (error) {
          console.error('applyStarted parse error:', error);
        }
      });

      evtSource.addEventListener('applyLog', (event) => {
        try {
          const payload = JSON.parse(event.data);
          if (!payload.runId) return;

          const existing = runLogsById.get(payload.runId) || '';
          const merged = (existing + (payload.chunk || '')).slice(-300000);
          runLogsById.set(payload.runId, merged);

          const run = runsById.get(payload.runId);
          if (run) {
            run.logPreview = merged.slice(-2000);
            runsById.set(payload.runId, run);
          }

          if (expandedRunId === payload.runId) {
            renderRunsList();
          }
        } catch (error) {
          console.error('applyLog parse error:', error);
        }
      });

      evtSource.addEventListener('applyFinished', (event) => {
        try {
          const payload = JSON.parse(event.data);
          activeRunBySlide.delete(payload.slide);

          upsertRun({
            runId: payload.runId,
            slide: payload.slide,
            model: payload.model || '',
            status: payload.success ? 'success' : 'failed',
            code: payload.code,
            message: payload.message,
            finishedAt: new Date().toISOString(),
          });

          addChatMessage(
            payload.success ? 'system' : 'error',
            `[${payload.slide}] ${payload.message || (payload.success ? 'completed' : 'failed')}`,
          );

          renderRunsList();
          updateSendState();
          setStatus(payload.message || 'Run finished.');
        } catch (error) {
          console.error('applyFinished parse error:', error);
        }
      });

      evtSource.addEventListener('fileChanged', (event) => {
        try {
          const { file } = JSON.parse(event.data);
          if (file === currentSlideFile()) {
            slideIframe.src = slideIframe.src;
          }
        } catch (error) {
          console.error('fileChanged parse error:', error);
        }
      });

      evtSource.onerror = () => {
        statusDot.classList.remove('connected');
        statusDot.classList.add('disconnected');
        statusConn.textContent = 'Disconnected';
      };
    }

    async function loadRunsInitial() {
      try {
        const res = await fetch('/api/runs');
        if (!res.ok) return;
        const payload = await res.json();

        runsById.clear();
        for (const run of payload.runs || []) {
          upsertRun(run);
          if (run.logPreview) runLogsById.set(run.runId, run.logPreview);
        }

        activeRunBySlide.clear();
        for (const active of payload.activeRuns || []) {
          if (active.slide && active.runId) {
            activeRunBySlide.set(active.slide, active.runId);
          }
        }

        renderRunsList();
        updateSendState();
      } catch {
        // ignore
      }
    }

    // -------------------------------------------------------------------------
    // Event wiring
    // -------------------------------------------------------------------------
    btnPrev.addEventListener('click', () => goToSlide(currentIndex - 1));
    btnNext.addEventListener('click', () => goToSlide(currentIndex + 1));

    btnClearBboxes.addEventListener('click', clearBboxesForCurrentSlide);

    drawLayer.addEventListener('mousedown', startDrawing);
    window.addEventListener('mousemove', moveDrawing);
    window.addEventListener('mouseup', endDrawing);

    btnSend.addEventListener('click', applyChanges);

    modelSelect.addEventListener('change', () => {
      const nextModel = normalizeModelName(modelSelect.value);
      if (!availableModels.includes(nextModel)) {
        modelSelect.value = selectedModel;
        return;
      }

      selectedModel = nextModel;
      saveSelectedModel(selectedModel);
      updateSendState();
      setStatus(`Model selected: ${selectedModel}`);
    });

    promptInput.addEventListener('input', () => {
      const slide = currentSlideFile();
      if (slide) {
        const state = getSlideState(slide);
        state.prompt = promptInput.value;
      }
      updateSendState();
    });

    document.addEventListener('keydown', (event) => {
      const inTextarea = document.activeElement === promptInput;

      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        event.preventDefault();
        applyChanges();
        return;
      }

      if (event.key === 'Escape') {
        return;
      }

      if (inTextarea) return;

      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        goToSlide(currentIndex - 1);
      } else if (event.key === 'ArrowRight') {
        event.preventDefault();
        goToSlide(currentIndex + 1);
      }
    });

    window.addEventListener('resize', scaleSlide);
    slideIframe.addEventListener('load', () => {
      renderBboxes();
      updateSendState();
    });

    // -------------------------------------------------------------------------
    // Init
    // -------------------------------------------------------------------------
    async function init() {
      setStatus('Loading slide list...');

      try {
        const res = await fetch('/api/slides');
        if (!res.ok) {
          throw new Error(`Failed to fetch slide list: ${res.status}`);
        }

        slides = await res.json();

        if (slides.length === 0) {
          setStatus('No slides found.');
          slideCounter.textContent = '0 / 0';
          return;
        }

        await loadModelOptions();
        goToSlide(0);
        scaleSlide();
        await loadRunsInitial();
        connectSSE();

        setStatus(`Ready. Model: ${selectedModel}. Draw red pending bboxes, run Codex, then review green bboxes.`);
      } catch (error) {
        setStatus(`Error loading slides: ${error.message}`);
        console.error('Init error:', error);
      }
    }

    init();
  </script>
</body>
</html>
