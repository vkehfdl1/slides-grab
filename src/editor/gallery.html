<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pack Gallery - slides-grab-studio</title>
  <link rel="icon" type="image/png" href="/asset/buddy_logo_round.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="/gallery.css">
  <script>(function(){var t=localStorage.getItem('sg-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: light)').matches)document.documentElement.setAttribute('data-theme','light')})();</script>
</head>
<body>
  <div class="gallery-container">
    <div class="nav-bar">
      <a class="nav-brand" href="/">
        <img class="logo-dark" src="/asset/buddy_logo_round(dark).png" alt="">
        <img class="logo-light" src="/asset/buddy_logo_round(light).png" alt="">
        <span class="nav-brand-text">slides-grab<span>-studio</span></span>
      </a>
      <div class="nav-spacer"></div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle light/dark mode">
        <svg class="theme-icon theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-icon theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>

    <div class="gallery-header">
      <h1>Pack Gallery</h1>
      <p class="gallery-subtitle">Browse all template packs and preview their designs</p>
    </div>

    <div class="gallery-grid" id="gallery-grid">
      <div class="gallery-loading">
        <div class="loading-spinner"></div>
        Loading packs...
      </div>
    </div>

    <!-- Pack detail modal -->
    <div class="gallery-modal-backdrop" id="gallery-modal-backdrop" hidden>
      <div class="gallery-modal" role="dialog" aria-modal="true">
        <div class="gallery-modal-header">
          <span class="gallery-modal-name" id="gallery-modal-name"></span>
          <span class="gallery-modal-label">Preview</span>
          <button class="gallery-modal-close" id="gallery-modal-close" type="button" aria-label="Close">&times;</button>
        </div>
        <div class="gallery-modal-desc" id="gallery-modal-desc"></div>
        <div class="gallery-modal-types" id="gallery-modal-types"></div>
        <div class="gallery-modal-preview">
          <div class="gallery-preview-wrapper-modal" id="gallery-preview-wrapper">
            <div class="gallery-preview-skeleton" id="gallery-preview-skeleton">Loading preview...</div>
            <iframe class="gallery-preview-iframe-modal" id="gallery-preview-iframe" sandbox="allow-same-origin" loading="lazy"></iframe>
          </div>
        </div>
        <div class="gallery-modal-footer">
          <a class="gallery-modal-use-btn" id="gallery-modal-use-btn" href="/">Use this pack &rarr;</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initGalleryModal, openPackModal } from '/js/gallery-modal.js';

    const grid = document.getElementById('gallery-grid');
    let commonTypes = {};

    function safeColor(v, fallback) {
      const s = typeof v === 'string' ? v.trim() : '';
      return /^#[0-9a-fA-F]{3,8}$/.test(s) ? s : fallback;
    }

    const PACK_DESC = {
      'simple_light': 'Clean white + orange accent',
      'simple_dark': 'Dark minimal monochrome',
      'midnight': 'Deep navy + gold premium dark',
      'corporate': 'White + navy blue business',
      'creative': 'Gradient pink/indigo creative',
      'grab': 'Modern business inline style',
      'mobile_strategy': 'Dark rose + pink mobile strategy',
      'black_rainbow': 'Black with rainbow accents',
      'bold_minimal': 'Bold typography minimal layout',
      'green': 'Fresh green nature-inspired',
    };

    async function loadCommonTypes() {
      try {
        const res = await fetch('/packs-preview/common-types.json');
        if (res.ok) commonTypes = await res.json();
      } catch { /* silent */ }
    }

    async function loadGallery() {
      try {
        const res = await fetch('/api/packs');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const packs = await res.json();
        renderGallery(packs);
      } catch (err) {
        grid.innerHTML = `
          <div class="gallery-error">
            <p>Failed to load packs: ${err.message}</p>
          </div>
        `;
      }
    }

    /** Featured template types for thumbnail strip (in priority order). */
    const FEATURED_TYPES = ['content', 'section-divider', 'chart', 'highlight', 'two-columns', 'statistics', 'timeline'];

    /** Swatch definitions with semantic labels. */
    const SWATCH_DEFS = [
      { key: 'bg-primary', label: 'BG', fallback: '#333' },
      { key: 'accent', label: 'Accent', fallback: '#666' },
      { key: 'text-primary', label: 'Text', fallback: '#fff' },
      { key: 'text-secondary', label: 'Muted', fallback: '#aaa' },
    ];

    /** Auto-scale an iframe to fill its wrapper after load. */
    function autoScaleIframe(iframe, wrapper) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        let w = 0, h = 0;
        const slide = doc.querySelector('.slide');
        if (slide) { const r = slide.getBoundingClientRect(); w = r.width; h = r.height; }
        if (!(w > 0 && h > 0) && doc.body) {
          const cs = iframe.contentWindow.getComputedStyle(doc.body);
          w = parseFloat(cs.width); h = parseFloat(cs.height);
        }
        if (w > 0 && h > 0) {
          iframe.style.width = w + 'px';
          iframe.style.height = h + 'px';
          const ww = wrapper.clientWidth || 400;
          iframe.style.transform = `scale(${ww / w})`;
        }
      } catch (_) { /* cross-origin */ }
      iframe.style.opacity = '1';
    }

    function renderGallery(packs) {
      grid.innerHTML = '';

      for (const pack of packs) {
        const card = document.createElement('div');
        card.className = 'gallery-card';

        const colors = pack.colors || {};
        const bg = safeColor(colors['bg-primary'], '#333');
        const accent = safeColor(colors.accent, '#666');
        const textPrimary = safeColor(colors['text-primary'], '#fff');
        const textSecondary = safeColor(colors['text-secondary'], '#aaa');
        const templates = pack.templates || [];
        const hasCover = templates.includes('cover');

        // ── Hero preview (cover) ──
        const previewWrapper = document.createElement('div');
        previewWrapper.className = 'gallery-preview-wrapper';

        if (hasCover) {
          const iframe = document.createElement('iframe');
          iframe.className = 'gallery-preview-iframe';
          iframe.src = `/packs-preview/${encodeURIComponent(pack.id)}/templates/cover.html`;
          iframe.loading = 'lazy';
          iframe.setAttribute('sandbox', 'allow-same-origin');
          iframe.setAttribute('tabindex', '-1');
          iframe.setAttribute('aria-hidden', 'true');
          iframe.addEventListener('load', () => autoScaleIframe(iframe, previewWrapper));
          previewWrapper.appendChild(iframe);
        } else {
          const preview = document.createElement('div');
          preview.className = 'gallery-preview-fallback';
          preview.style.background = bg;
          preview.innerHTML = `
            <div class="preview-title-bar" style="background:${textPrimary}"></div>
            <div class="preview-accent-bar" style="background:${accent}"></div>
            <div class="preview-body-bar" style="background:${textSecondary}"></div>`;
          previewWrapper.appendChild(preview);
        }

        // Hover overlay
        const overlay = document.createElement('div');
        overlay.className = 'gallery-preview-overlay';
        overlay.innerHTML = '<span class="gallery-preview-overlay-text">Click to explore all templates</span>';
        previewWrapper.appendChild(overlay);

        // ── Thumbnail strip (3 featured templates) ──
        const featured = FEATURED_TYPES.filter(t => t !== 'cover' && templates.includes(t)).slice(0, 3);
        let thumbStrip = null;
        if (featured.length > 0) {
          thumbStrip = document.createElement('div');
          thumbStrip.className = 'gallery-thumb-strip';

          for (const tmpl of featured) {
            const item = document.createElement('div');
            item.className = 'gallery-thumb-item';

            const label = document.createElement('span');
            label.className = 'gallery-thumb-label';
            label.textContent = tmpl;
            item.appendChild(label);

            const tIframe = document.createElement('iframe');
            tIframe.className = 'gallery-thumb-iframe';
            tIframe.src = `/packs-preview/${encodeURIComponent(pack.id)}/templates/${encodeURIComponent(tmpl)}.html`;
            tIframe.loading = 'lazy';
            tIframe.setAttribute('sandbox', 'allow-same-origin');
            tIframe.setAttribute('tabindex', '-1');
            tIframe.setAttribute('aria-hidden', 'true');
            tIframe.addEventListener('load', () => autoScaleIframe(tIframe, item));
            item.appendChild(tIframe);

            thumbStrip.appendChild(item);
          }
        }

        // ── Info section ──
        const info = document.createElement('div');
        info.className = 'gallery-card-info';

        // Name row
        const nameRow = document.createElement('div');
        nameRow.className = 'gallery-card-name-row';
        const name = document.createElement('h2');
        name.className = 'gallery-card-name';
        name.textContent = pack.name || pack.id;
        const count = document.createElement('span');
        count.className = 'gallery-card-count';
        count.textContent = `${templates.length} templates`;
        nameRow.append(name, count);

        const desc = document.createElement('p');
        desc.className = 'gallery-card-desc';
        desc.textContent = PACK_DESC[pack.id] || '';

        // Labeled swatches
        const swatches = document.createElement('div');
        swatches.className = 'gallery-swatches-labeled';
        for (const def of SWATCH_DEFS) {
          const c = safeColor(colors[def.key], def.fallback);
          const item = document.createElement('div');
          item.className = 'gallery-swatch-item';
          item.innerHTML = `<div class="gallery-swatch-color" style="background:${c}" title="${c}"></div><span class="gallery-swatch-label">${def.label}</span>`;
          swatches.appendChild(item);
        }

        // CTA
        const cta = document.createElement('div');
        cta.className = 'gallery-card-cta';
        cta.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Explore all ${templates.length} templates</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:auto"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;

        info.append(nameRow);
        if (desc.textContent) info.appendChild(desc);
        info.appendChild(swatches);
        info.appendChild(cta);

        card.appendChild(previewWrapper);
        if (thumbStrip) card.appendChild(thumbStrip);
        card.appendChild(info);
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.addEventListener('click', () => openPackModal(pack));
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPackModal(pack); }
        });
        grid.appendChild(card);
      }
    }

    // Load common types first (tiny), then init modal + gallery in parallel
    await loadCommonTypes();
    initGalleryModal(commonTypes);
    await loadGallery();

    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('sg-theme', next);
    });
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
      if (!localStorage.getItem('sg-theme')) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'light' : 'dark');
      }
    });
  </script>
</body>
</html>
