<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f1f38 0%, #0a1628 40%, #07101e 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 64pt 80pt;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  body::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320pt;
    height: 320pt;
    background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 60%);
    border-radius: 50%;
  }
  .deco-top, .deco-bottom {
    width: 40pt;
    height: 2pt;
    background: linear-gradient(90deg, transparent, #c9a96e, transparent);
    border-radius: 1pt;
  }
  .deco-top { margin-bottom: 28pt; }
  .deco-bottom { margin-top: 28pt; }
  h1 {
    font-size: 36pt;
    font-weight: 800;
    color: #e8edf5;
    letter-spacing: -1pt;
    text-shadow: 0 2pt 12pt rgba(0,0,0,0.4);
    position: relative;
  }
</style>
</head>
<body>
  <div class="deco-top"></div>
  <h1>Section title</h1>
  <div class="deco-bottom"></div>
</body>
</html>
