<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: linear-gradient(160deg, #0f1f38 0%, #0a1628 40%, #07101e 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64pt 80pt;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: -60pt;
    right: -60pt;
    width: 240pt;
    height: 240pt;
    background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }
  .accent-line {
    width: 48pt;
    height: 3pt;
    background: linear-gradient(90deg, #c9a96e, rgba(201,169,110,0.3));
    border-radius: 2pt;
    margin-bottom: 28pt;
  }
  h1 {
    font-size: 42pt;
    font-weight: 800;
    color: #e8edf5;
    letter-spacing: -1.5pt;
    line-height: 1.15;
    margin-bottom: 14pt;
    text-shadow: 0 2pt 8pt rgba(0,0,0,0.3);
  }
  p {
    font-size: 14pt;
    color: #8899b0;
    font-weight: 400;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="accent-line"></div>
  <h1>Slide Deck Title</h1>
  <p>This is just the beginning of something big.</p>
</body>
</html>
