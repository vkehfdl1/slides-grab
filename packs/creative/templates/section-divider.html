<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 64pt 80pt;
    position: relative;
    overflow: hidden;
  }
  .shape-1 {
    position: absolute;
    top: 40pt;
    right: 80pt;
    width: 120pt;
    height: 120pt;
    background: linear-gradient(135deg, rgba(244,114,182,0.15), rgba(129,140,248,0.08));
    border-radius: 50%;
    filter: blur(4pt);
  }
  .shape-2 {
    position: absolute;
    bottom: 50pt;
    left: 60pt;
    width: 80pt;
    height: 80pt;
    background: linear-gradient(135deg, rgba(129,140,248,0.12), rgba(244,114,182,0.06));
    border-radius: 50%;
    filter: blur(3pt);
  }
  .shape-3 {
    position: absolute;
    top: 80pt;
    left: 140pt;
    width: 40pt;
    height: 40pt;
    background: rgba(244,114,182,0.1);
    border-radius: 50%;
    filter: blur(2pt);
  }
  h1 {
    font-size: 40pt;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1pt;
    text-align: center;
    position: relative;
    text-shadow: 0 2pt 16pt rgba(244,114,182,0.15);
  }
</style>
</head>
<body>
  <div class="shape-1"></div>
  <div class="shape-2"></div>
  <div class="shape-3"></div>
  <h1>Section title</h1>
</body>
</html>
