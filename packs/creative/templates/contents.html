<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    bottom: -40pt;
    right: -40pt;
    width: 160pt;
    height: 160pt;
    background: radial-gradient(circle, rgba(244,114,182,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  h2 {
    font-size: 22pt;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5pt;
    margin-bottom: 36pt;
  }
  .toc {
    display: flex;
    flex-direction: column;
    gap: 16pt;
  }
  .toc-item {
    display: flex;
    align-items: center;
    gap: 14pt;
    padding-bottom: 16pt;
    border-bottom: 1pt solid rgba(196,181,253,0.12);
  }
  .toc-item:last-child { border-bottom: none; }
  .toc-num {
    width: 28pt;
    height: 28pt;
    border-radius: 50%;
    background: linear-gradient(135deg, #f472b6, #818cf8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11pt;
    font-weight: 700;
    color: #ffffff;
    flex-shrink: 0;
  }
  .toc-title {
    font-size: 13pt;
    font-weight: 600;
    color: #ffffff;
  }
  .toc-desc {
    font-size: 11pt;
    color: #c4b5fd;
    margin-left: auto;
  }
</style>
</head>
<body>
  <h2>Contents</h2>
  <div class="toc">
    <div class="toc-item">
      <span class="toc-num">01</span>
      <span class="toc-title">First section</span>
    </div>
    <div class="toc-item">
      <span class="toc-num">02</span>
      <span class="toc-title">Second section</span>
    </div>
    <div class="toc-item">
      <span class="toc-num">03</span>
      <span class="toc-title">Third section</span>
    </div>
    <div class="toc-item">
      <span class="toc-num">04</span>
      <span class="toc-title">Fourth section</span>
    </div>
  </div>
</body>
</html>
