<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60pt 80pt;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320pt;
    height: 320pt;
    background: radial-gradient(circle, rgba(244,114,182,0.08) 0%, rgba(129,140,248,0.04) 50%, transparent 70%);
    border-radius: 50%;
  }
  h2 {
    font-size: 20pt;
    font-weight: 800;
    color: #f472b6;
    letter-spacing: -0.5pt;
    margin-bottom: 20pt;
    position: relative;
  }
  p {
    font-size: 15pt;
    line-height: 1.7;
    color: #ffffff;
    max-width: 440pt;
    position: relative;
  }
  a {
    display: inline-block;
    margin-top: 18pt;
    font-size: 11pt;
    font-weight: 600;
    text-decoration: none;
    background: linear-gradient(90deg, #f472b6, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
  }
</style>
</head>
<body>
  <h2>Highlight</h2>
  <p>Use this slide to highlight a single, important thing. To keep it short and sweet, you might link away to relevant doc or file.</p>
  <a href="#">View details &rarr;</a>
</body>
</html>
