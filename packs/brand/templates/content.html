<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="./theme.css">
  <style>
    
    body {
      margin: 0; width: 720pt; height: 405pt;
      font-family: var(--font-sans, 'Pretendard', sans-serif);
      background: var(--bg-primary, #fff);
      color: var(--text-primary, #373742);
      overflow: hidden;
    }
    
    .slide {
      width: 720pt; height: 405pt;
      box-sizing: border-box; position: relative;
      display: flex;
    }
    .lp {
      width: 250pt; background: var(--bg-secondary, #f3f3f3);
      position: relative; padding: 48pt 24pt 48pt 36pt;
      clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
      flex-shrink: 0;
    }
    .lp-label {
      position: absolute; top: 14pt; left: 36pt;
      font-size: var(--text-label, 10pt); font-weight: 500;
      color: var(--text-secondary, #5A5A65); letter-spacing: 0.02em;
    }
    .lp-bar {
      width: 4pt; height: 50pt; background: var(--accent, #FC5E20);
      position: absolute; left: 30pt; top: 96pt;
    }
    .lp h1 {
      font-size: var(--title-section, 40pt); font-weight: 800;
      color: var(--text-primary, #373742); margin-top: 48pt;
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .rp {
      flex: 1; padding: 48pt 28pt 32pt 28pt;
      display: flex; flex-direction: column;
      position: relative;
    }
    .rp h2 {
      font-size: var(--title-slide, 30pt); font-weight: 800;
      color: var(--accent, #FC5E20); margin-bottom: 20pt;
    }
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14pt 32pt; margin-bottom: 16pt;
    }
    .info-grid h6 {
      font-size: var(--text-body, 15pt); font-weight: 700;
      color: var(--text-heading, #19194E); margin: 0 0 4pt;
    }
    .info-grid p {
      font-size: var(--text-subtitle, 18pt); font-weight: 700;
      color: var(--accent, #FC5E20); margin: 0;
    }
    .body-text {
      font-size: var(--text-body, 15pt); color: var(--text-primary, #373742);
      line-height: 1.7; margin: 0;
    }
    
    .ft {
      position: absolute; bottom: 8pt; left: 0; right: 0;
      text-align: center; font-size: var(--text-label, 10pt); color: #bbb;
    }
  </style>
</head>
<body>
  <div class="slide">
    
    <div class="lp">
      <p class="lp-label" data-slot="label">Section Label</p>
      <div class="lp-bar"></div>
      <h1 data-slot="title">Section Title</h1>
    </div>
    <div class="rp">
      <h2 data-slot="subtitle">Page Headline</h2>
      <div class="info-grid" data-slot="body">
        <div><h6>Field A</h6><p>Value A</p></div>
        <div><h6>Field B</h6><p>Value B</p></div>
      </div>
      <p class="body-text">Body content goes here. Supports info-rows, descriptions, and links.</p>
    </div>
    <p class="ft" data-slot="caption">ⓒ 2026 Company. All rights reserved.</p>
  </div>
</body>
</html>
