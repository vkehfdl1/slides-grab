<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="./theme.css">
  <style>
    body {
      margin: 0; width: 720pt; height: 405pt;
      font-family: var(--font-sans, 'Pretendard', sans-serif);
      background: var(--bg-primary, #fff);
      color: var(--text-primary, #373742);
      overflow: hidden;
    }
    .slide {
      width: 720pt; height: 405pt;
      box-sizing: border-box; position: relative;
      display: flex;
    }
    .lp {
      width: 250pt; background: var(--bg-secondary, #f3f3f3);
      position: relative; padding: 48pt 24pt 48pt 36pt;
      clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
      flex-shrink: 0;
    }
    .lp-label {
      position: absolute; top: 14pt; left: 36pt;
      font-size: var(--text-label, 10pt); font-weight: 500;
      color: var(--text-secondary, #5A5A65); letter-spacing: 0.02em;
    }
    .lp-bar {
      width: 4pt; height: 50pt; background: var(--accent, #FC5E20);
      position: absolute; left: 30pt; top: 96pt;
    }
    .lp h1 {
      font-size: var(--title-section, 40pt); font-weight: 800;
      color: var(--text-primary, #373742); margin-top: 48pt;
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .rp {
      flex: 1; padding: 36pt 24pt 32pt 20pt;
      display: flex; flex-direction: column;
      align-items: center; position: relative;
    }
    .hero {
      font-size: var(--title-slide, 30pt); font-weight: 700;
      color: var(--accent, #FC5E20);
      text-align: center; margin: 0 0 6pt;
    }
    .sub {
      font-size: var(--text-body, 15pt);
      color: var(--text-primary, #373742);
      text-align: center; margin: 0 0 18pt; line-height: 1.5;
    }
    .cards {
      display: flex; gap: 14pt; width: 100%;
    }
    .card {
      flex: 1; border: 1pt solid var(--border, #eee);
      border-radius: 10pt; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .card-hd {
      background: var(--accent, #FC5E20); color: #fff;
      font-size: 14pt; font-weight: 700;
      text-align: center; padding: 9pt; margin: 0;
    }
    .card-bd {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 10pt; min-height: 140pt;
    }
    .card-bd div[data-image-placeholder] {
      width: 100%; height: 100%; min-height: 120pt;
      background: var(--bg-secondary, #f3f3f3); border-radius: 4pt;
    }
    .ft {
      position: absolute; bottom: 8pt; left: 0; right: 0;
      text-align: center; font-size: var(--text-label, 10pt); color: #bbb;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="lp">
      <p class="lp-label" data-slot="label">Section Label</p>
      <div class="lp-bar"></div>
      <h1 data-slot="title">Section Title</h1>
    </div>
    <div class="rp">
      <h2 class="hero" data-slot="subtitle">Key Highlight Message</h2>
      <p class="sub" data-slot="body">Supporting description or achievement details.</p>
      <div class="cards">
        <div class="card">
          <h4 class="card-hd">Category A</h4>
          <div class="card-bd"><div data-image-placeholder></div></div>
        </div>
        <div class="card">
          <h4 class="card-hd">Category B</h4>
          <div class="card-bd"><div data-image-placeholder></div></div>
        </div>
        <div class="card">
          <h4 class="card-hd">Category C</h4>
          <div class="card-bd"><div data-image-placeholder></div></div>
        </div>
      </div>
    </div>
    <p class="ft" data-slot="caption">ⓒ 2026 Company. All rights reserved.</p>
  </div>
</body>
</html>
