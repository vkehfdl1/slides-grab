<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="./theme.css">
  <style>
    body {
      margin: 0; width: 720pt; height: 405pt;
      font-family: var(--font-sans, 'Pretendard', sans-serif);
      background: var(--bg-primary, #fff);
      color: var(--text-primary, #373742);
      overflow: hidden;
    }
    .slide {
      width: 720pt; height: 405pt;
      box-sizing: border-box; position: relative;
      display: flex;
    }
    .lp {
      width: 250pt; background: var(--bg-secondary, #f3f3f3);
      position: relative; padding: 48pt 24pt 48pt 36pt;
      clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
      flex-shrink: 0;
    }
    .lp-label {
      position: absolute; top: 14pt; left: 36pt;
      font-size: var(--text-label, 10pt); font-weight: 500;
      color: var(--text-secondary, #5A5A65); letter-spacing: 0.02em;
    }
    .lp-bar {
      width: 4pt; height: 50pt; background: var(--accent, #FC5E20);
      position: absolute; left: 30pt; top: 96pt;
    }
    .lp h1 {
      font-size: var(--title-section, 40pt); font-weight: 800;
      color: var(--text-primary, #373742); margin-top: 48pt;
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .rp {
      flex: 1; padding: 48pt 24pt 32pt 20pt;
      display: flex; flex-direction: column;
      justify-content: center; position: relative;
    }
    .funnel { display: flex; flex-direction: column; gap: 14pt; }
    .stage { display: flex; align-items: center; gap: 10pt; }
    .bar {
      height: 28pt; background: var(--accent, #FC5E20);
      border-radius: 4pt; flex-shrink: 0;
    }
    .stage:nth-child(1) .bar { width: 80%; opacity: 1; }
    .stage:nth-child(2) .bar { width: 65%; opacity: 0.85; }
    .stage:nth-child(3) .bar { width: 50%; opacity: 0.70; }
    .stage:nth-child(4) .bar { width: 35%; opacity: 0.55; }
    .stage h5 {
      font-size: var(--text-caption, 11pt); font-weight: 700;
      color: var(--text-primary, #373742); white-space: nowrap; margin: 0;
    }
    .stage p {
      font-size: var(--text-caption, 11pt);
      color: var(--text-secondary, #5A5A65); white-space: nowrap; margin: 0;
    }
    .ft {
      position: absolute; bottom: 8pt; left: 0; right: 0;
      text-align: center; font-size: var(--text-label, 10pt); color: #bbb;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="lp">
      <p class="lp-label" data-slot="label">Section Label</p>
      <div class="lp-bar"></div>
      <h1 data-slot="title">Section Title</h1>
    </div>
    <div class="rp">
      <div class="funnel" data-slot="body">
        <div class="stage">
          <div class="bar"></div>
          <h5>Stage 1</h5>
          <p>100%</p>
        </div>
        <div class="stage">
          <div class="bar"></div>
          <h5>Stage 2</h5>
          <p>85%</p>
        </div>
        <div class="stage">
          <div class="bar"></div>
          <h5>Stage 3</h5>
          <p>70%</p>
        </div>
        <div class="stage">
          <div class="bar"></div>
          <h5>Stage 4</h5>
          <p>55%</p>
        </div>
      </div>
    </div>
    <p class="ft" data-slot="caption">ⓒ 2026 Company. All rights reserved.</p>
  </div>
</body>
</html>
