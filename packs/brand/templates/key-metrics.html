<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="./theme.css">
  <style>
    
    body {
      margin: 0; width: 720pt; height: 405pt;
      font-family: var(--font-sans, 'Pretendard', sans-serif);
      background: var(--bg-primary, #fff);
      color: var(--text-primary, #373742);
      overflow: hidden;
    }
    
    .slide {
      width: 720pt; height: 405pt;
      box-sizing: border-box; position: relative;
      display: flex;
    }
    .lp {
      width: 250pt; background: var(--bg-secondary, #f3f3f3);
      position: relative; padding: 48pt 24pt 48pt 36pt;
      clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
      flex-shrink: 0;
    }
    .lp-label {
      position: absolute; top: 14pt; left: 36pt;
      font-size: var(--text-label, 10pt); font-weight: 500;
      color: var(--text-secondary, #5A5A65); letter-spacing: 0.02em;
    }
    .lp-bar {
      width: 4pt; height: 50pt; background: var(--accent, #FC5E20);
      position: absolute; left: 30pt; top: 96pt;
    }
    .lp h1 {
      font-size: var(--title-section, 40pt); font-weight: 800;
      color: var(--text-primary, #373742); margin-top: 48pt;
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .rp {
      flex: 1; padding: 48pt 24pt 32pt 20pt;
      display: flex; flex-direction: column;
      align-items: center; position: relative;
    }
    .hero {
      font-size: 22pt; font-weight: 700;
      text-align: center; margin: 0 0 2pt;
    }
    .hero .acc { color: var(--accent, #FC5E20); }
    .sub {
      font-size: var(--text-subtitle, 18pt); color: var(--text-primary, #373742);
      text-align: center; margin: 0 0 20pt;
    }
    .metrics { display: flex; gap: 16pt; width: 100%; }
    .mc {
      display: flex; flex-direction: column;
      align-items: center; gap: 8pt; flex: 1;
    }
    .mc div[data-image-placeholder] {
      width: 56pt; height: 56pt;
      background: var(--bg-secondary, #f3f3f3); border-radius: 8pt;
    }
    .mc h3 {
      font-size: 34pt; font-weight: 800;
      color: var(--accent, #FC5E20); letter-spacing: -0.02em; margin: 0;
    }
    .mc h6 {
      background: var(--accent, #FC5E20); color: #fff;
      border-radius: 20pt; padding: 6pt 14pt;
      font-size: var(--text-caption, 11pt); font-weight: 500;
      text-align: center; line-height: 1.4; margin: 0;
    }
    
    .ft {
      position: absolute; bottom: 8pt; left: 0; right: 0;
      text-align: center; font-size: var(--text-label, 10pt); color: #bbb;
    }
  </style>
</head>
<body>
  <div class="slide">
    
    <div class="lp">
      <p class="lp-label" data-slot="label">Section Label</p>
      <div class="lp-bar"></div>
      <h1 data-slot="title">Section Title</h1>
    </div>
    <div class="rp">
      <h2 class="hero"><span class="acc" data-slot="subtitle">Accent Headline</span></h2>
      <p class="sub" data-slot="body">Supporting description text.</p>
      <div class="metrics">
        <div class="mc">
          <div data-image-placeholder></div>
          <h3 data-slot="metric">700+</h3>
          <h6>Metric A<br>Label</h6>
        </div>
        <div class="mc">
          <div data-image-placeholder></div>
          <h3 data-slot="metric">15K+</h3>
          <h6>Metric B<br>Label</h6>
        </div>
        <div class="mc">
          <div data-image-placeholder></div>
          <h3 data-slot="metric">1500+</h3>
          <h6>Metric C<br>Label</h6>
        </div>
        <div class="mc">
          <div data-image-placeholder></div>
          <h3 data-slot="metric">200+</h3>
          <h6>Metric D<br>Label</h6>
        </div>
      </div>
    </div>
    <p class="ft" data-slot="caption">ⓒ 2026 Company. All rights reserved.</p>
  </div>
</body>
</html>
