<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="./theme.css">
  <style>
    body {
      margin: 0; width: 720pt; height: 405pt;
      font-family: var(--font-sans, 'Pretendard', sans-serif);
      background: var(--bg-primary, #fff);
      color: var(--text-primary, #373742);
      overflow: hidden;
    }
    .slide {
      width: 720pt; height: 405pt;
      box-sizing: border-box; position: relative;
      display: flex;
    }
    .lp {
      width: 250pt; background: var(--bg-secondary, #f3f3f3);
      position: relative; padding: 48pt 24pt 48pt 36pt;
      clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
      flex-shrink: 0;
    }
    .lp-label {
      position: absolute; top: 14pt; left: 36pt;
      font-size: var(--text-label, 10pt); font-weight: 500;
      color: var(--text-secondary, #5A5A65); letter-spacing: 0.02em;
    }
    .lp-bar {
      width: 4pt; height: 50pt; background: var(--accent, #FC5E20);
      position: absolute; left: 30pt; top: 96pt;
    }
    .lp h1 {
      font-size: var(--title-section, 40pt); font-weight: 800;
      color: var(--text-primary, #373742); margin-top: 48pt;
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .rp {
      flex: 1; padding: 48pt 24pt 32pt 20pt;
      display: flex; align-items: center;
      justify-content: center; position: relative;
    }
    .matrix-side {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; width: 100%; height: 100%;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 3pt; width: 280pt; height: 260pt;
    }
    .cell {
      background: var(--bg-secondary, #f3f3f3);
      border-radius: 8pt; display: flex;
      align-items: center; justify-content: center;
      font-size: var(--text-caption, 11pt); font-weight: 600;
      letter-spacing: 0.02em; color: var(--text-primary, #373742);
    }
    .axis-label {
      font-size: 9pt; color: var(--text-secondary, #5A5A65);
      font-weight: 500; letter-spacing: 0.02em;
      position: absolute;
    }
    .axis-top { top: 8pt; }
    .axis-bottom { bottom: 8pt; }
    .axis-left { left: 4pt; transform: rotate(-90deg); }
    .axis-right { right: 4pt; transform: rotate(-90deg); }
    .ft {
      position: absolute; bottom: 8pt; left: 0; right: 0;
      text-align: center; font-size: var(--text-label, 10pt); color: #bbb;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="lp">
      <p class="lp-label" data-slot="label">Section Label</p>
      <div class="lp-bar"></div>
      <h1 data-slot="title">Section Title</h1>
    </div>
    <div class="rp">
      <div class="matrix-side" data-slot="body">
        <p class="axis-label axis-top">Label</p>
        <p class="axis-label axis-bottom">Label</p>
        <p class="axis-label axis-left">Label</p>
        <p class="axis-label axis-right">Label</p>
        <div class="grid">
          <div class="cell"><p>Label</p></div>
          <div class="cell"><p>Label</p></div>
          <div class="cell"><p>Label</p></div>
          <div class="cell"><p>Label</p></div>
        </div>
      </div>
    </div>
    <p class="ft" data-slot="caption">ⓒ 2026 Company. All rights reserved.</p>
  </div>
</body>
</html>
