<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="./theme.css">
  <style>
    
    body {
      margin: 0; width: 720pt; height: 405pt;
      font-family: var(--font-sans, 'Pretendard', sans-serif);
      background: var(--bg-primary, #fff);
      color: var(--text-primary, #373742);
      overflow: hidden;
    }
    
    .slide {
      width: 720pt; height: 405pt;
      box-sizing: border-box; position: relative;
      display: flex;
    }
    .lp {
      width: 250pt; background: var(--bg-secondary, #f3f3f3);
      position: relative; padding: 48pt 24pt 48pt 36pt;
      clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
      flex-shrink: 0;
    }
    .lp-label {
      position: absolute; top: 14pt; left: 36pt;
      font-size: var(--text-label, 10pt); font-weight: 500;
      color: var(--text-secondary, #5A5A65); letter-spacing: 0.02em;
    }
    .lp-bar {
      width: 4pt; height: 50pt; background: var(--accent, #FC5E20);
      position: absolute; left: 30pt; top: 96pt;
    }
    .lp h1 {
      font-size: var(--title-section, 40pt); font-weight: 800;
      color: var(--text-primary, #373742); margin-top: 48pt;
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .rp {
      flex: 1; padding: 48pt 24pt 32pt 20pt;
      display: flex; flex-direction: column;
      position: relative;
    }
    .rp > p {
      font-size: 15pt; font-weight: 700; color: var(--text-primary, #373742);
      text-align: center; margin: 0 0 14pt; line-height: 1.5;
    }
    .rp > p .acc { color: var(--accent, #FC5E20); }
    .split { display: flex; gap: 14pt; flex: 1; width: 100%; }
    .info {
      width: 140pt; border: 1pt solid var(--border, #eee); border-radius: 8pt;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .info-hd {
      background: var(--accent, #FC5E20); color: #fff;
      font-size: 14pt; font-weight: 700;
      text-align: center; padding: 8pt; margin: 0;
    }
    .info-bd { padding: 12pt 14pt; margin: 0; }
    .info-bd li {
      font-size: var(--text-caption, 11pt); color: var(--text-primary, #373742);
      line-height: 2.2; list-style: disc inside;
    }
    .photo {
      flex: 1; border-radius: 8pt; overflow: hidden;
      background: var(--bg-secondary, #f3f3f3);
    }
    .photo div[data-image-placeholder] { width: 100%; height: 100%; }
    
    .ft {
      position: absolute; bottom: 8pt; left: 0; right: 0;
      text-align: center; font-size: var(--text-label, 10pt); color: #bbb;
    }
  </style>
</head>
<body>
  <div class="slide">
    
    <div class="lp">
      <p class="lp-label" data-slot="label">Section Label</p>
      <div class="lp-bar"></div>
      <h1 data-slot="title">Section Title</h1>
    </div>
    <div class="rp">
      <p data-slot="subtitle">Description with <span class="acc">accent location</span> details.</p>
      <div class="split" data-slot="body">
        <div class="info">
          <h4 class="info-hd">Center Name</h4>
          <ul class="info-bd">
            <li>Facility detail A</li>
            <li>Facility detail B</li>
            <li>Facility detail C</li>
          </ul>
        </div>
        <div class="photo">
          <div data-image-placeholder></div>
        </div>
      </div>
    </div>
    <p class="ft" data-slot="caption">ⓒ 2026 Company. All rights reserved.</p>
  </div>
</body>
</html>
