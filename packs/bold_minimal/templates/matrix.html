<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .slide-layout { display: flex; height: 100%; gap: 32px; align-items: center; }
    .text-area { flex: 0.4; }
    .matrix-area {
      flex: 0.6;
      height: 280px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .matrix-axis-x, .matrix-axis-y {
      position: absolute;
      background-color: var(--border-color);
    }
    .matrix-axis-x { width: 100%; height: 2px; }
    .matrix-axis-y { height: 100%; width: 2px; }

    .axis-label {
      position: absolute;
      font-size: 10px;
      font-weight: 800;
      color: var(--text-secondary);
      background: var(--bg-primary);
      padding: 4px;
    }
    .label-up { top: -10px; }
    .label-down { bottom: -10px; }
    .label-left { left: -10px; }
    .label-right { right: -10px; }

    .matrix-logo {
      position: absolute;
      width: 48px;
      height: 48px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    /* Example positioning */
    .logo-1 { top: 20%; right: 20%; background: var(--bg-accent); } /* Our Company */
    .logo-2 { top: 60%; left: 30%; }
    .logo-3 { bottom: 20%; right: 40%; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-layout">
      <div class="text-area">
        <div class="slide-label" data-slot="label">MARKET OVERVIEW</div>
        <h2 class="slide-title" data-slot="title">We're well positioned to win in this market.</h2>
      </div>
      <div class="matrix-area">
        <div class="matrix-axis-x"></div>
        <div class="matrix-axis-y"></div>
        <div class="axis-label label-up" data-slot="axis-up">UP</div>
        <div class="axis-label label-down" data-slot="axis-down">DOWN</div>
        <div class="axis-label label-left" data-slot="axis-left">LEFT</div>
        <div class="axis-label label-right" data-slot="axis-right">RIGHT</div>

        <div class="matrix-logo logo-1" data-slot="logo-main">LOGO</div>
        <div class="matrix-logo logo-2" data-slot="logo-comp1">LOGO</div>
        <div class="matrix-logo logo-3" data-slot="logo-comp2">LOGO</div>
      </div>
    </div>
    <div class="slide-footer">
      <div class="badge dark" data-slot="company">COMPANY NAME</div>
      <div class="badge" data-slot="footer-tag">CONFIDENTIAL</div>
    </div>
  </div>
</body>
</html>
