<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .slide {
      padding: 0; /* Full bleed */
    }
    .full-image-bg {
      width: 100%;
      height: 100%;
      background-image: repeating-conic-gradient(#f3f4f6 0% 25%, #e5e7eb 0% 50%);
      background-size: 40px 40px;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 32px 40px;
    }
    /* Overlay UI Box */
    .callout-box {
      position: absolute;
      bottom: 80px; /* Above footer */
      left: 40px;
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 24px;
      padding: 16px 24px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      max-width: 50%;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="full-image-bg" data-slot="image-bg">
      <div class="slide-label" style="position: relative; z-index: 2;" data-slot="label">OUR PRODUCT</div>
      <div class="callout-box" data-slot="callout">
        STATISTIC OR CALL OUT OVER IMAGE
      </div>
    </div>
    <div class="slide-footer">
      <div class="badge dark" data-slot="company">COMPANY NAME</div>
      <div class="badge" style="background: var(--bg-secondary);" data-slot="footer-tag">CONFIDENTIAL</div>
    </div>
  </div>
</body>
</html>
