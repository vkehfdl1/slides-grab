<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .closing-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
    }
    .closing-title {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    .closing-email {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--bg-accent);
      padding-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="closing-layout">
      <h1 class="closing-title" data-slot="title">Thank you</h1>
      <a href="#" class="closing-email" data-slot="email">EMAIL@COMPANYNAME.COM</a>
    </div>
  </div>
</body>
</html>
