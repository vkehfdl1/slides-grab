<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>

    .slide {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 56pt;
    }
    .section-num {
      font-size: 52pt;
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 14pt;
      letter-spacing: -0.04em;
    }
    .accent-line { margin-bottom: 18pt; }
    .title {
      max-width: 380pt;
      font-size: 36pt;
      line-height: 1.04;
      letter-spacing: -0.04em;
      margin-bottom: 14pt;
    }
    .sub {
      max-width: 260pt;
      font-size: 12pt;
      line-height: 1.52;
    }
    .orb-deco {
      position: absolute;
      right: -32pt;
      top: 50%;
      transform: translateY(-50%);
      width: 260pt;
      height: 260pt;
      border-radius: 50%;
      background: radial-gradient(circle at 42% 38%, rgba(255,255,255,0.72) 0 18%, rgba(255,255,255,0.18) 19% 44%, rgba(255,255,255,0) 45% 100%);
      opacity: 0.88;
      pointer-events: none;
    }

  </style>
</head>
<body class="light">

  <div class="slide">
    <div class="orb-deco" aria-hidden="true"></div>
    <p class="section-num" data-slot="number">01</p>
    <div class="accent-line"></div>
    <h1 class="title" data-slot="title">Section Title</h1>
    <p class="sub" data-slot="body">Brief description of this section.</p>

    <div class="deck-footer" aria-hidden="true">
      <div class="year-stack">
        <p>20</p>
        <p>25</p>
      </div>
      <div class="brand-copy">
        <p class="brand-name">Real Balance Presentation</p>
        <p class="brand-site">www.website.com</p>
      </div>
    </div>

    <p class="page-number" data-slot="page-number">03</p>
  </div>

</body>
</html>
