<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cover</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="base.css" />
</head>
<body>
  <main class="slide" data-template="cover" style="--pad-x:48pt; --pad-y:40pt;" data-variation="hero">
    <section class="slide-inner" style="display:flex; flex-direction:column; justify-content:center; gap:18pt;">
      <h1 class="slide-title hero" data-slot="title" style="max-width:360pt;">Slide Deck Title</h1>
      <p class="slide-body" data-slot="subtitle" style="font-size:18pt; max-width:344pt; color:rgba(255,255,255,0.9);">This is just the beginning of something big.</p>
      <p class="meta fine-print" data-slot="meta" style="position:absolute; left:48pt; bottom:28pt;">Deck subtitle · Date · Author</p>
    </section>
  </main>
</body>
</html>
