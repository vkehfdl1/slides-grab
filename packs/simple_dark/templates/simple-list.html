<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>simple-list</title><link rel="stylesheet" href="theme.css" /><link rel="stylesheet" href="base.css" /></head>
<body>
  <main class="slide" data-template="simple-list">
    <section class="slide-inner row" style="padding-top:78pt; gap:72pt; align-items:flex-start;">
      <h1 class="slide-title" data-slot="title" style="width:118pt; font-size:20pt; letter-spacing:-0.01em;">Simple list</h1>
      <div class="col" style="width:352pt; gap:22pt;">
        <article class="col" style="gap:5pt;"><h2 class="slide-title" data-slot="label" style="font-size:15pt;">First thing</h2><p class="slide-body small-body" data-slot="body">Add a quick description of each thing, with enough context to understand what’s up.</p></article>
        <article class="col" style="gap:5pt;"><h2 class="slide-title" data-slot="label" style="font-size:15pt;">Second thing</h2><p class="slide-body small-body" data-slot="body">Keep ’em short and sweet, so they’re easy to scan and remember.</p></article>
        <article class="col" style="gap:5pt;"><h2 class="slide-title" data-slot="label" style="font-size:15pt;">Third thing</h2><p class="slide-body small-body" data-slot="body">If you’ve got a bunch, add another row, or use multiple copies of this slide.</p></article>
      </div>
    </section>
  </main>
</body>
</html>
