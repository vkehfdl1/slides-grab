<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>split-layout</title><link rel="stylesheet" href="theme.css" /><link rel="stylesheet" href="base.css" /></head>
<body>
  <main class="slide" data-template="split-layout">
    <section class="slide-inner row" style="align-items:center; gap:38pt;">
      <div class="col" style="width:220pt; gap:14pt; padding-top:8pt;">
        <h1 class="slide-title" data-slot="title" style="font-size:28pt;">Header</h1>
        <p class="slide-body" data-slot="body">Add a quick description of each thing, with enough context to understand what’s up.</p>
      </div>
      <div class="placeholder media-slot" data-slot="image" style="width:300pt; height:270pt;"></div>
    </section>
  </main>
</body>
</html>
