<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>image-text</title><link rel="stylesheet" href="theme.css" /><link rel="stylesheet" href="base.css" /></head>
<body>
  <main class="slide" data-template="image-text">
    <section class="slide-inner" style="padding-top:38pt;">
      <h1 class="slide-title" data-slot="title" style="font-size:28pt; margin-bottom:24pt;">Image with description</h1>
      <div class="row" style="gap:24pt;">
        <article class="col" style="width:304pt; gap:14pt;">
          <div class="placeholder media-slot" data-slot="image" style="width:100%; height:170pt;"></div>
          <div class="col" style="gap:6pt;"><h2 class="slide-title" data-slot="label" style="font-size:18pt;">First thing</h2><p class="slide-body small-body" data-slot="body">Add a quick description of each thing, with enough context to understand what’s up.</p></div>
        </article>
        <article class="col" style="width:304pt; gap:14pt;">
          <div class="placeholder media-slot" data-slot="image" style="width:100%; height:170pt;"></div>
          <div class="col" style="gap:6pt;"><h2 class="slide-title" data-slot="label" style="font-size:18pt;">Second thing</h2><p class="slide-body small-body" data-slot="body">Keep ’em short and sweet, so they’re easy to scan and remember.</p></div>
        </article>
      </div>
    </section>
  </main>
