<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>quote</title><link rel="stylesheet" href="theme.css" /><link rel="stylesheet" href="base.css" /></head>
<body>
  <main class="slide" data-template="quote">
    <section class="slide-inner center">
      <div class="col" style="align-items:center; gap:18pt; transform:translateY(10pt); max-width:416pt; text-align:center;">
        <div class="avatar" aria-hidden="true"></div>
        <blockquote class="quote-text" data-slot="quote" style="font-size:16pt; line-height:1.35; letter-spacing:-0.03em;">“This is a stellar quote from a user or customer that really stands out.”</blockquote>
        <p class="slide-body small-body" data-slot="author" style="color:var(--text-tertiary);">Full Name · Location</p>
      </div>
    </section>
  </main>
</body>
</html>
