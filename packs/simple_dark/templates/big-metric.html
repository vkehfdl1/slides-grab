<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>big-metric</title><link rel="stylesheet" href="theme.css" /><link rel="stylesheet" href="base.css" /></head>
<body>
  <main class="slide" data-template="big-metric">
    <section class="slide-inner row" style="padding-top:88pt; gap:42pt; align-items:flex-start;">
      <div style="width:150pt;"><p class="metric-value" data-slot="metric" style="font-size:32pt;">XX%</p></div>
      <div class="col" style="width:330pt; gap:10pt;">
        <p class="slide-body" data-slot="body">Highlight a key metric—like a goal, objective, or insight—that supports the narrative of your deck.</p>
        <p class="fine-print" data-slot="caption">Add a link to a relevant doc or dashboard.</p>
      </div>
    </section>
  </main>
</body>
</html>
