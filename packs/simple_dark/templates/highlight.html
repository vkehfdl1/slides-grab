<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>highlight</title><link rel="stylesheet" href="theme.css" /><link rel="stylesheet" href="base.css" /></head>
<body>
  <main class="slide" data-template="highlight">
    <section class="slide-inner row" style="align-items:flex-start; padding-top:66pt; gap:82pt;">
      <div style="width:178pt;"><h1 class="slide-title" data-slot="title" style="font-size:19pt;">Highlight</h1></div>
      <div class="col" style="width:254pt; gap:12pt;">
        <p class="slide-body" data-slot="body">Use this slide to highlight a single, important thing. To keep it short and sweet, you might link away to relevant doc or file.</p>
        <p class="fine-print" data-slot="caption">Supporting context or source</p>
      </div>
    </section>
  </main>
</body>
</html>
