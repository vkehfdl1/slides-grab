<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>key-metrics</title><link rel="stylesheet" href="theme.css" /><link rel="stylesheet" href="base.css" /></head>
<body>
  <main class="slide" data-template="key-metrics">
    <section class="slide-inner" style="padding-top:52pt;">
      <h1 class="slide-title" data-slot="title" style="font-size:28pt; margin-bottom:22pt;">Key Metrics</h1>
      <div class="col" style="gap:18pt; max-width:330pt;">
        <article class="row" style="gap:16pt; align-items:flex-start;"><p class="metric-value" data-slot="metric" style="font-size:22pt; width:70pt;">XX%</p><div class="col" style="gap:4pt;"><h2 class="slide-title" data-slot="label" style="font-size:11pt; letter-spacing:0.02em;">Metric 1</h2><p class="slide-body small-body" data-slot="body">Add a description or highlight changes.</p></div></article>
        <article class="row" style="gap:16pt; align-items:flex-start;"><p class="metric-value" data-slot="metric" style="font-size:22pt; width:70pt;">XX%</p><div class="col" style="gap:4pt;"><h2 class="slide-title" data-slot="label" style="font-size:11pt; letter-spacing:0.02em;">Metric 2</h2><p class="slide-body small-body" data-slot="body">Add a description or highlight changes.</p></div></article>
        <article class="row" style="gap:16pt; align-items:flex-start;"><p class="metric-value" data-slot="metric" style="font-size:22pt; width:70pt;">XX%</p><div class="col" style="gap:4pt;"><h2 class="slide-title" data-slot="label" style="font-size:11pt; letter-spacing:0.02em;">Metric 3</h2><p class="slide-body small-body" data-slot="body">Add a description or highlight changes.</p></div></article>
      </div>
    </section>
  </main>
</body>
</html>
