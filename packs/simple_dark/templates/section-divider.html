<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>section-divider</title><link rel="stylesheet" href="theme.css" /><link rel="stylesheet" href="base.css" /></head>
<body>
  <main class="slide" data-template="section-divider" data-variation="section">
    <section class="slide-inner center">
      <div class="col" style="align-items:center; gap:10pt; transform:translateY(-4pt);">
        <p class="slide-subtitle" data-slot="subtitle">Section marker</p>
        <h1 class="slide-title centered" data-slot="title" style="font-size:24pt;">Section title</h1>
      </div>
    </section>
  </main>
</body>
</html>
