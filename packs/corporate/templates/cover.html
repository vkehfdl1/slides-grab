<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64pt 80pt;
    position: relative;
    overflow: hidden;
  }
  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 6pt;
    height: 100%;
    background: #2563eb;
  }
  .accent-line-top {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4pt;
    background: linear-gradient(90deg, #2563eb 0%, #2563eb 40%, transparent 100%);
  }
  h1 {
    font-size: 40pt;
    font-weight: 800;
    color: #1e293b;
    letter-spacing: -1.5pt;
    line-height: 1.15;
    margin-bottom: 12pt;
  }
  .subtitle {
    font-size: 15pt;
    color: #64748b;
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 36pt;
  }
  .meta {
    display: flex;
    align-items: center;
    gap: 20pt;
  }
  .meta-item {
    font-size: 10pt;
    font-weight: 500;
    color: #64748b;
    letter-spacing: 0.3pt;
    text-transform: uppercase;
  }
  .meta-divider {
    width: 1pt;
    height: 12pt;
    background: #cbd5e1;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="accent-line-top"></div>
  <h1>Presentation Title</h1>
  <p class="subtitle">Strategic overview and key recommendations</p>
  <div class="meta">
    <span class="meta-item">March 2026</span>
    <div class="meta-divider"></div>
    <span class="meta-item">Prepared by Team Name</span>
    <div class="meta-divider"></div>
    <span class="meta-item">Confidential</span>
  </div>
</body>
</html>
