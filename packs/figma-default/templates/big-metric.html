<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60pt 80pt;
    text-align: center;
  }
  .metric {
    font-size: 72pt;
    font-weight: 800;
    color: #000;
    letter-spacing: -2pt;
    line-height: 1;
    margin-bottom: 20pt;
  }
  p {
    font-size: 12pt;
    line-height: 1.6;
    color: #6b6b6b;
    max-width: 360pt;
  }
  a {
    display: inline-block;
    margin-top: 12pt;
    font-size: 11pt;
    color: #FC5E20;
    font-weight: 600;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="metric">XX%</div>
  <p>Highlight a key metric — like a goal, objective, or insight — that supports the narrative of your deck.</p>
  <a href="#">View dashboard →</a>
</body>
</html>
