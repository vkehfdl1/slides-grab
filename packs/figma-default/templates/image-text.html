<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ffffff;
    display: flex;
  }
  .text-side {
    flex: 1;
    padding: 56pt 48pt;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .text-side .subtitle {
    font-size: 11pt;
    font-weight: 700;
    color: #000;
    margin-bottom: 4pt;
  }
  .text-side h2 {
    font-size: 24pt;
    font-weight: 800;
    color: #000;
    letter-spacing: -0.5pt;
  }
  .text-side p {
    font-size: 11pt;
    line-height: 1.6;
    color: #6b6b6b;
  }
  .image-side {
    flex: 1;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: 14pt;
  }
</style>
</head>
<body>
  <div class="text-side">
    <div>
      <p class="subtitle">Subtitle</p>
      <h2>Header</h2>
    </div>
    <p>Add a quick description of each thing, with enough context to understand what's up.</p>
  </div>
  <div class="image-side">
    Image
  </div>
</body>
</html>
