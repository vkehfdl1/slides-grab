<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ffffff;
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: 22pt;
    font-weight: 800;
    color: #000;
    letter-spacing: -0.5pt;
    margin-bottom: 32pt;
  }
  .cards {
    display: flex;
    gap: 16pt;
    flex: 1;
  }
  .card {
    flex: 1;
    background: #f5f5f5;
    border-radius: 12pt;
    padding: 24pt;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card h3 {
    font-size: 13pt;
    font-weight: 700;
    color: #000;
  }
  .card p {
    font-size: 13pt;
    font-weight: 700;
    color: #000;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <h2>Principles</h2>
  <div class="cards">
    <div class="card">
      <h3>Principle 1</h3>
      <p>This is what we believe.</p>
    </div>
    <div class="card">
      <h3>Principle 2</h3>
      <p>It's how we make decisions.</p>
    </div>
    <div class="card">
      <h3>Principle 3</h3>
      <p>And what we aim to achieve.</p>
    </div>
  </div>
</body>
</html>
