<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 64pt 80pt;
  }
  h1 {
    font-size: 36pt;
    font-weight: 800;
    color: #000;
    letter-spacing: -1pt;
    margin-bottom: 10pt;
  }
  p {
    font-size: 14pt;
    color: #6b6b6b;
  }
</style>
</head>
<body>
  <h1>Thank you</h1>
  <p>Any questions?</p>
</body>
</html>
