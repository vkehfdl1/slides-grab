<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 64pt 100pt;
    text-align: center;
  }
  .avatar {
    width: 48pt;
    height: 48pt;
    border-radius: 50%;
    background: #f0f0f0;
    margin-bottom: 20pt;
  }
  blockquote {
    font-size: 16pt;
    font-weight: 400;
    color: #000;
    line-height: 1.6;
    margin-bottom: 14pt;
  }
  .author {
    font-size: 10pt;
    color: #999;
  }
</style>
</head>
<body>
  <div class="avatar"></div>
  <blockquote>"This is a stellar quote from a user or customer that really stands out."</blockquote>
  <p class="author">Full Name · Location</p>
</body>
</html>
