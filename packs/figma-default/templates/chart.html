<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ffffff;
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: 22pt;
    font-weight: 800;
    color: #000;
    letter-spacing: -0.5pt;
    margin-bottom: 8pt;
  }
  .subtitle {
    font-size: 11pt;
    color: #6b6b6b;
    margin-bottom: 24pt;
  }
  .chart-area {
    flex: 1;
    background: #f5f5f5;
    border-radius: 8pt;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: 12pt;
  }
</style>
</head>
<body>
  <h2>Chart title</h2>
  <p class="subtitle">Description about the chart data.</p>
  <div class="chart-area">Chart / Graph</div>
</body>
</html>
