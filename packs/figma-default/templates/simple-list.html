<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ffffff;
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: 22pt;
    font-weight: 800;
    color: #000;
    letter-spacing: -0.5pt;
    margin-bottom: 36pt;
  }
  .list { display: flex; flex-direction: column; gap: 24pt; }
  .item h3 {
    font-size: 13pt;
    font-weight: 700;
    color: #000;
    margin-bottom: 4pt;
  }
  .item p {
    font-size: 11pt;
    line-height: 1.6;
    color: #6b6b6b;
  }
</style>
</head>
<body>
  <h2>Simple list</h2>
  <div class="list">
    <div class="item">
      <h3>First thing</h3>
      <p>Add a quick description of each thing, with enough context to understand what's up.</p>
    </div>
    <div class="item">
      <h3>Second thing</h3>
      <p>Keep 'em short and sweet, so they're easy to scan and remember.</p>
    </div>
    <div class="item">
      <h3>Third thing</h3>
      <p>If you've got a bunch, add another row, or use multiple copies of this slide.</p>
    </div>
  </div>
</body>
</html>
