<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ffffff;
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: 22pt;
    font-weight: 800;
    color: #000;
    letter-spacing: -0.5pt;
    margin-bottom: 36pt;
  }
  .toc {
    display: flex;
    flex-direction: column;
    gap: 16pt;
  }
  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 12pt;
    padding-bottom: 16pt;
    border-bottom: 1pt solid #f0f0f0;
  }
  .toc-item:last-child { border-bottom: none; }
  .toc-num {
    font-size: 12pt;
    font-weight: 700;
    color: #000;
    min-width: 20pt;
  }
  .toc-title {
    font-size: 13pt;
    font-weight: 600;
    color: #000;
  }
  .toc-desc {
    font-size: 11pt;
    color: #6b6b6b;
    margin-left: auto;
  }
</style>
</head>
<body>
  <h2>Contents</h2>
  <div class="toc">
    <div class="toc-item">
      <span class="toc-num">01</span>
      <span class="toc-title">First section</span>
    </div>
    <div class="toc-item">
      <span class="toc-num">02</span>
      <span class="toc-title">Second section</span>
    </div>
    <div class="toc-item">
      <span class="toc-num">03</span>
      <span class="toc-title">Third section</span>
    </div>
    <div class="toc-item">
      <span class="toc-num">04</span>
      <span class="toc-title">Fourth section</span>
    </div>
  </div>
</body>
</html>
