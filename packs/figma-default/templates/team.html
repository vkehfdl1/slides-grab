<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #ffffff;
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: 22pt;
    font-weight: 800;
    color: #000;
    text-align: center;
    margin-bottom: 32pt;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 20pt 16pt;
    flex: 1;
    align-content: start;
  }
  .member {
    text-align: center;
  }
  .avatar {
    width: 40pt;
    height: 40pt;
    border-radius: 50%;
    background: #f0f0f0;
    margin: 0 auto 8pt;
  }
  .name {
    font-size: 10pt;
    font-weight: 700;
    color: #000;
    margin-bottom: 2pt;
  }
  .role {
    font-size: 9pt;
    color: #999;
  }
</style>
</head>
<body>
  <h2>Meet the team</h2>
  <div class="grid">
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
  </div>
</body>
</html>
