<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    .closing-subtitle {
      position: absolute;
      left: 30pt;
      top: 100pt;
      width: 180pt;
      margin: 0;
      color: rgba(255, 255, 255, 0.76);
      font-size: 13pt;
      font-weight: 400;
      line-height: 1.22;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>
  <div class="slide dark closing-gradient">
    <div class="hero-line"></div>
    <h1 class="hero-title closing" data-slot="title">Q&amp;A</h1>
    <p class="closing-subtitle" data-slot="subtitle">Thank you for the review.</p>
    <div class="footer">
      <div class="footer-mark"></div>
      <div class="footer-meta">
        <p data-slot="meta-1">Reviews / Mobile Strategy</p>
        <p data-slot="meta-2">Product review — Month XX</p>
        <p data-slot="meta-3">Closing</p>
      </div>
      <p class="page-number" data-slot="page">20</p>
    </div>
  </div>
</body>
</html>
