<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    .layout {
      position: absolute;
      left: 22pt;
      right: 30pt;
      top: 24pt;
      bottom: 38pt;
      display: grid;
      grid-template-columns: 1.32fr 0.68fr;
      gap: 24pt;
      align-items: start;
    }
    .visual {
      height: 272pt;
      background: var(--placeholder);
      border-radius: 8pt;
      margin-top: 2pt;
    }
    .copy {
      padding-top: 22pt;
    }
    .copy h2 {
      margin: 0 0 12pt 0;
      font-size: 23pt;
      font-weight: 650;
      letter-spacing: -0.055em;
      line-height: 0.98;
      color: var(--text-primary);
      max-width: 220pt;
      white-space: pre-line;
    }
    .copy p {
      margin: 0;
      font-size: 17pt;
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1.15;
      color: var(--text-secondary);
      max-width: 235pt;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="slide light">
    <div class="layout">
      <section>
        <div class="visual" data-image-placeholder data-slot="image"></div>
      </section>
      <section class="copy">
        <h2 data-slot="title">Users found it difficult to log back into their accounts</h2>
        <p data-slot="body">Many users reported experiencing challenges when trying to log back into their accounts.</p>
      </section>
    </div>
    <div class="footer">
      <div class="footer-mark"></div>
      <div class="footer-meta">
        <p data-slot="meta-1">Reviews / Mobile Strategy</p>
        <p data-slot="meta-2">Product review — Month XX</p>
        <p data-slot="meta-3">Research insights</p>
      </div>
      <p class="page-number" data-slot="page">8</p>
    </div>
  </div>
</body>
</html>
