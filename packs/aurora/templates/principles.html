<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    .goal-grid {
      position: absolute;
      left: 32pt;
      right: 36pt;
      top: 72pt;
      bottom: 42pt;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8pt;
    }
    .goal {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 8pt;
    }
    .goal-label {
      margin: 0;
      font-size: 10pt;
      font-weight: 650;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1;
    }
    .goal-title {
      margin: 0;
      font-size: 16.5pt;
      font-weight: 400;
      letter-spacing: -0.04em;
      color: var(--text-secondary);
      line-height: 1.04;
      min-height: 34pt;
    }
    .goal-visual {
      background: var(--placeholder);
      border-radius: 8pt;
    }
  </style>
</head>
<body>
  <div class="slide light">
    <div class="goal-grid">
      <article class="goal">
        <p class="goal-label" data-slot="label-1">Goal 1</p>
        <p class="goal-title" data-slot="title-1">Showcase our point of view</p>
        <div class="goal-visual" data-image-placeholder data-slot="image-1"></div>
      </article>
      <article class="goal">
        <p class="goal-label" data-slot="label-2">Goal 2</p>
        <p class="goal-title" data-slot="title-2">Get feedback on framing</p>
        <div class="goal-visual" data-image-placeholder data-slot="image-2"></div>
      </article>
      <article class="goal">
        <p class="goal-label" data-slot="label-3">Goal 3</p>
        <p class="goal-title" data-slot="title-3">Solicit feedback for designs</p>
        <div class="goal-visual" data-image-placeholder data-slot="image-3"></div>
      </article>
    </div>
    <div class="footer">
      <div class="footer-mark"></div>
      <div class="footer-meta">
        <p data-slot="meta-1">Reviews / Mobile Strategy</p>
        <p data-slot="meta-2">Product review — Month XX</p>
        <p data-slot="meta-3">Q3 Goals</p>
      </div>
      <p class="page-number" data-slot="page">5</p>
    </div>
  </div>
</body>
</html>
