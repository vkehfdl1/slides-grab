<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    .layout {
      position: absolute;
      left: 32pt;
      top: 24pt;
      right: 34pt;
      bottom: 36pt;
      display: grid;
      grid-template-columns: 1.3fr 0.92fr;
      column-gap: 28pt;
    }
    .title-wrap {
      padding-top: 6pt;
    }
    .title-wrap h1 {
      margin: 0;
      font-size: 33pt;
      font-weight: 650;
      letter-spacing: -0.055em;
      line-height: 0.98;
      color: var(--text-primary);
      max-width: 350pt;
      white-space: pre-line;
    }
    .body-wrap {
      padding-top: 6pt;
    }
    .body-wrap p {
      margin: 0;
      font-size: 17pt;
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1.14;
      color: var(--text-secondary);
      max-width: 250pt;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="slide light">
    <div class="layout">
      <section class="title-wrap">
        <h1 data-slot="title">Vision for the
Mobile roadmap</h1>
      </section>
      <section class="body-wrap">
        <p data-slot="body">Dive into the innovative features and enhancements that will shape the user experience and exceed expectations.</p>
      </section>
    </div>
    <div class="footer">
      <div class="footer-mark"></div>
      <div class="footer-meta">
        <p data-slot="meta-1">Reviews / Mobile Strategy</p>
        <p data-slot="meta-2">Product review — Month XX</p>
        <p data-slot="meta-3">Section</p>
      </div>
      <p class="page-number" data-slot="page">4</p>
    </div>
  </div>
</body>
</html>
