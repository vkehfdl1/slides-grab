<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    .bleed {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.055) 50%, transparent 50%) 0 0 / 64pt 64pt,
        linear-gradient(rgba(0, 0, 0, 0.055) 50%, transparent 50%) 0 0 / 64pt 64pt,
        #efefef;
      overflow: hidden;
    }
    .phone {
      position: absolute;
      width: 122pt;
      height: 218pt;
      border-radius: 24pt;
      border: 4pt solid #181818;
      background: linear-gradient(180deg, #2f2f30 0%, #111112 100%);
      box-shadow: inset 0 0 0 1pt rgba(255,255,255,0.18);
    }
    .phone::before {
      content: "";
      position: absolute;
      top: 7pt;
      left: 50%;
      transform: translateX(-50%);
      width: 38pt;
      height: 9pt;
      border-radius: 5pt;
      background: #050506;
    }
    .phone::after {
      content: "";
      position: absolute;
      inset: 7pt;
      border-radius: 18pt;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.05) 50%, transparent 50%) 0 0 / 18pt 18pt,
        linear-gradient(rgba(0, 0, 0, 0.05) 50%, transparent 50%) 0 0 / 18pt 18pt,
        #ededed;
    }
    .p1 { left: -20pt; top: -32pt; }
    .p2 { left: 108pt; top: 56pt; }
    .p3 { left: 272pt; top: -34pt; }
    .p4 { left: 310pt; top: 158pt; }
    .p5 { left: 472pt; top: -36pt; }
    .p6 { left: 636pt; top: 62pt; }
    .p7 { left: 14pt; top: 252pt; }
    .p8 { left: 438pt; top: 254pt; }
  </style>
</head>
<body>
  <div class="slide light">
    <div class="bleed" data-image-placeholder data-slot="image">
      <div class="phone p1"></div>
      <div class="phone p2"></div>
      <div class="phone p3"></div>
      <div class="phone p4"></div>
      <div class="phone p5"></div>
      <div class="phone p6"></div>
      <div class="phone p7"></div>
      <div class="phone p8"></div>
    </div>
  </div>
</body>
</html>
