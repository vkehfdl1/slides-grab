<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .slide-layout { display: flex; flex-direction: column; height: 100%; justify-content: center; }
    .header-area { margin-bottom: 40px; text-align: center; }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      padding: 0 16px;
    }
    .member {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-image: repeating-conic-gradient(#111 0% 25%, #222 0% 50%);
      background-size: 16px 16px;
      border: 2px solid var(--border-subtle);
      margin-bottom: 12px;
    }
    .member-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--text-main); }
    .member-title { font-size: 8px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
