<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .header-area { margin-bottom: 48px; }
    .header-desc { font-size: 16px; color: var(--text-main); margin-top: 8px; font-weight: 500; }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      align-items: start;
    }
    .metric-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 2px solid var(--border-subtle);
      padding-top: 16px;
    }

    /* 각 지표 상단 라인에 무지개색 포인트 적용 */
    .metric-item:nth-child(1) { border-top-color: #ff7171; }
    .metric-item:nth-child(2) { border-top-color: #ffb86c; }
    .metric-item:nth-child(3) { border-top-color: #86efac; }
    .metric-item:nth-child(4) { border-top-color: #60a5fa; }

    .metric-large-value { font-size: 48px; font-weight: 700; color: var(--text-main); line-height: 1; margin-bottom: 4px; }
    .metric-label { font-size: 14px; font-weight: 600; color: var(--text-main); }
    .metric-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="header-area">
      <div class="slide-label" data-slot="label">THEME 1: ISSUES WITH VARIABLES</div>
      <h2 class="slide-title" style="font-size: 28px;" data-slot="title">Sales Data</h2>
      <p class="header-desc" data-slot="subtitle">Deals against most common competitors (Miro, Mural, Lucid Spark)</p>
    </div>

    <div class="metrics-grid">
      <div class="metric-item">
        <div class="metric-large-value" data-slot="val-1">20%</div>
        <div class="metric-label" data-slot="lbl-1">Users</div>
        <div class="metric-desc" data-slot="desc-1">Description of key metric</div>
      </div>
      <div class="metric-item">
        <div class="metric-large-value" data-slot="val-2">20%</div>
        <div class="metric-label" data-slot="lbl-2">Users</div>
        <div class="metric-desc" data-slot="desc-2">Description of key metric</div>
      </div>
      <div class="metric-item">
        <div class="metric-large-value" data-slot="val-3">20%</div>
        <div class="metric-label" data-slot="lbl-3">Users</div>
        <div class="metric-desc" data-slot="desc-3">Description of key metric</div>
      </div>
      <div class="metric-item">
        <div class="metric-large-value" data-slot="val-4">20%</div>
        <div class="metric-label" data-slot="lbl-4">Users</div>
        <div class="metric-desc" data-slot="desc-4">Description of key metric</div>
      </div>
    </div>
  </div>
</body>
</html>
