<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .cover-layout {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
    }
    .cover-main-title {
      font-size: 56px;
      font-weight: 700;
      background: var(--rainbow-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 100px;
    }
    .meta-data {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="cover-layout">
      <div class="slide-label" data-slot="label">PRODUCT</div>
      <h1 class="cover-main-title" data-slot="title">Title</h1>
      <div class="meta-data">
        <div class="slide-body" data-slot="producer">Produced By</div>
        <div class="slide-body" data-slot="date">Date</div>
      </div>
    </div>
  </div>
</body>
</html>
