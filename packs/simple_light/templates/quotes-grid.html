<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-elevated: #eeeeee;
    --text-primary: #000000;
    --text-secondary: #6b6b6b;
    --accent: #FC5E20;
    --border: #e0e0e0;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 56pt 64pt;
  }
  .quotes {
    display: flex;
    gap: 32pt;
    width: 100%;
  }
  .quote-item {
    flex: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .avatar {
    width: 48pt;
    height: 48pt;
    border-radius: 50%;
    background: var(--border);
    margin-bottom: 16pt;
  }
  .quote-text {
    font-size: 14pt;
    line-height: 1.6;
    color: var(--text-primary);
    margin-bottom: 10pt;
  }
  .quote-author {
    font-size: 10pt;
    color: #999;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="quotes">
    <div class="quote-item">
      <div class="avatar"></div>
      <p class="quote-text">"The best quotes relate to your deck's overall narrative."</p>
      <p class="quote-author">Full Name · Location</p>
    </div>
    <div class="quote-item">
      <div class="avatar"></div>
      <p class="quote-text">"The best quotes relate to your deck's overall narrative."</p>
      <p class="quote-author">Full Name · Location</p>
    </div>
    <div class="quote-item">
      <div class="avatar"></div>
      <p class="quote-text">"The best quotes relate to your deck's overall narrative."</p>
      <p class="quote-author">Full Name · Location</p>
    </div>
  </div>
</body>
</html>
