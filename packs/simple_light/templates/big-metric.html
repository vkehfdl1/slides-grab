<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 64pt;
    --title-section: 44pt;
    --title-slide: 32pt;
    --text-subtitle: 20pt;
    --text-body: 16pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60pt 80pt;
    text-align: center;
  }
  .metric {
    font-size: 72pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1.0;
    margin-bottom: 20pt;
  }
  p {
    font-size: var(--text-body);
    line-height: 1.6;
    color: var(--text-secondary);
    max-width: 360pt;
  }
  a {
    display: inline-block;
    margin-top: 12pt;
    font-size: var(--text-label);
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.02em;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="metric">XX%</div>
  <p>Highlight a key metric — like a goal, objective, or insight — that supports the narrative of your deck.</p>
  <a href="#">View dashboard →</a>
</body>
</html>
