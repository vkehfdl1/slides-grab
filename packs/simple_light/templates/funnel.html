<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 64pt;
    --title-section: 44pt;
    --title-slide: 32pt;
    --text-subtitle: 20pt;
    --text-body: 16pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    display: flex;
  }
  .text-side {
    width: 240pt;
    padding: 56pt 40pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .text-side h2 {
    font-size: 28pt;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 12pt;
  }
  .text-side p {
    font-size: 14pt;
    line-height: 1.6;
    color: var(--text-secondary);
  }
  .funnel-side {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32pt;
  }
  .funnel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3pt;
    width: 100%;
  }
  .funnel-step {
    background: #e8e8e8;
    height: 40pt;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text-primary);
  }
  .funnel-step:nth-child(1) { width: 100%; border-radius: 4pt 4pt 0 0; }
  .funnel-step:nth-child(2) { width: 85%; }
  .funnel-step:nth-child(3) { width: 70%; }
  .funnel-step:nth-child(4) { width: 55%; }
  .funnel-step:nth-child(5) { width: 40%; border-radius: 0 0 4pt 4pt; }
</style>
</head>
<body>
  <div class="text-side">
    <h2>Top of funnel</h2>
    <p>Show how a few concepts relate sequentially, from top to bottom.</p>
  </div>
  <div class="funnel-side">
    <div class="funnel">
      <div class="funnel-step">Label</div>
      <div class="funnel-step">Label</div>
      <div class="funnel-step">Label</div>
      <div class="funnel-step">Label</div>
      <div class="funnel-step">Label</div>
    </div>
  </div>
</body>
</html>
