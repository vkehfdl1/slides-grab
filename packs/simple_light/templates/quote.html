<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 64pt;
    --title-section: 44pt;
    --title-slide: 32pt;
    --text-subtitle: 20pt;
    --text-body: 16pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 64pt 100pt;
    text-align: center;
  }
  .avatar {
    width: 48pt;
    height: 48pt;
    border-radius: 50%;
    background: #f0f0f0;
    margin-bottom: 20pt;
  }
  blockquote {
    font-size: 18pt;
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.6;
    margin-bottom: 14pt;
  }
  .author {
    font-size: var(--text-caption);
    color: #999;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="avatar"></div>
  <blockquote>"This is a stellar quote from a user or customer that really stands out."</blockquote>
  <p class="author">Full Name · Location</p>
</body>
</html>
