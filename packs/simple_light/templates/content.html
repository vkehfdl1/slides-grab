<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 64pt;
    --title-section: 44pt;
    --title-slide: 32pt;
    --text-subtitle: 20pt;
    --text-body: 16pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64pt 80pt;
  }
  h2 {
    font-size: var(--title-slide);
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 12pt;
  }
  p {
    font-size: var(--text-body);
    line-height: 1.6;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <h2>Section Title</h2>
  <p>Quick description about the section.</p>
</body>
</html>
