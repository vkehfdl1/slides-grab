<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-elevated: #eeeeee;
    --text-primary: #000000;
    --text-secondary: #6b6b6b;
    --accent: #FC5E20;
    --border: #e0e0e0;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64pt 80pt;
  }
  h2 {
    font-size: 28pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.5pt;
    margin-bottom: 12pt;
  }
  p {
    font-size: 13pt;
    line-height: 1.7;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <h2>Section Title</h2>
  <p>Quick description about the section.</p>
</body>
</html>
