<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-elevated: #eeeeee;
    --text-primary: #000000;
    --text-secondary: #6b6b6b;
    --accent: #FC5E20;
    --border: #e0e0e0;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-primary);
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: 22pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.5pt;
    margin-bottom: 40pt;
  }
  .metrics {
    display: flex;
    gap: 32pt;
    flex: 1;
    align-items: flex-start;
  }
  .metric {
    flex: 1;
    text-align: center;
  }
  .metric .number {
    font-size: 40pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -1pt;
    line-height: 1;
    margin-bottom: 12pt;
  }
  .metric h3 {
    font-size: 12pt;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6pt;
  }
  .metric p {
    font-size: 10pt;
    line-height: 1.5;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <h2>Key Metrics</h2>
  <div class="metrics">
    <div class="metric">
      <div class="number">XX%</div>
      <h3>Metric 1</h3>
      <p>Add a description or highlight changes</p>
    </div>
    <div class="metric">
      <div class="number">XX%</div>
      <h3>Metric 2</h3>
      <p>Add a description or highlight changes</p>
    </div>
    <div class="metric">
      <div class="number">XX%</div>
      <h3>Metric 3</h3>
      <p>Add a description or highlight changes</p>
    </div>
  </div>
</body>
</html>
