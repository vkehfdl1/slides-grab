<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 64pt;
    --title-section: 44pt;
    --title-slide: 32pt;
    --text-subtitle: 20pt;
    --text-body: 16pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: var(--title-slide);
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 40pt;
  }
  .metrics {
    display: flex;
    gap: 32pt;
    flex: 1;
    align-items: flex-start;
  }
  .metric {
    flex: 1;
    text-align: center;
  }
  .metric .number {
    font-size: 40pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1.0;
    margin-bottom: 12pt;
  }
  .metric h3 {
    font-size: var(--text-label);
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-bottom: 6pt;
  }
  .metric p {
    font-size: var(--text-caption);
    line-height: 1.6;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <h2>Key Metrics</h2>
  <div class="metrics">
    <div class="metric">
      <div class="number">XX%</div>
      <h3>Metric 1</h3>
      <p>Add a description or highlight changes</p>
    </div>
    <div class="metric">
      <div class="number">XX%</div>
      <h3>Metric 2</h3>
      <p>Add a description or highlight changes</p>
    </div>
    <div class="metric">
      <div class="number">XX%</div>
      <h3>Metric 3</h3>
      <p>Add a description or highlight changes</p>
    </div>
  </div>
</body>
</html>
