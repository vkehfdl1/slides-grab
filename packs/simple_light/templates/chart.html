<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-elevated: #eeeeee;
    --text-primary: #000000;
    --text-secondary: #6b6b6b;
    --accent: #FC5E20;
    --border: #e0e0e0;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-primary);
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: 32pt;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 8pt;
  }
  .subtitle {
    font-size: 14pt;
    color: var(--text-secondary);
    margin-bottom: 24pt;
  }
  .chart-area {
    flex: 1;
    background: var(--bg-secondary);
    border-radius: 8pt;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: 11pt;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <h2>Chart title</h2>
  <p class="subtitle">Description about the chart data.</p>
  <div class="chart-area">Chart / Graph</div>
</body>
</html>
