<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 64pt;
    --title-section: 44pt;
    --title-slide: 32pt;
    --text-subtitle: 20pt;
    --text-body: 16pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: var(--title-slide);
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 8pt;
  }
  .subtitle {
    font-size: 14pt;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 24pt;
  }
  .chart-area {
    flex: 1;
    background: var(--bg-secondary);
    border-radius: 8pt;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: var(--text-caption);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <h2>Chart title</h2>
  <p class="subtitle">Description about the chart data.</p>
  <div class="chart-area">Chart / Graph</div>
</body>
</html>
