<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 64pt;
    --title-section: 44pt;
    --title-slide: 32pt;
    --text-subtitle: 20pt;
    --text-body: 16pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: var(--title-slide);
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 36pt;
  }
  .toc {
    display: flex;
    flex-direction: column;
    gap: 16pt;
  }
  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 12pt;
    padding-bottom: 16pt;
    border-bottom: 1pt solid #f0f0f0;
  }
  .toc-item:last-child { border-bottom: none; }
  .toc-num {
    font-size: var(--text-label);
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    min-width: 20pt;
  }
  .toc-title {
    font-size: var(--text-body);
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.6;
  }
  .toc-desc {
    font-size: var(--text-caption);
    color: var(--text-secondary);
    letter-spacing: 0.02em;
    margin-left: auto;
  }
</style>
</head>
<body>
  <h2>Contents</h2>
  <div class="toc">
    <div class="toc-item">
      <span class="toc-num">01</span>
      <span class="toc-title">First section</span>
    </div>
    <div class="toc-item">
      <span class="toc-num">02</span>
      <span class="toc-title">Second section</span>
    </div>
    <div class="toc-item">
      <span class="toc-num">03</span>
      <span class="toc-title">Third section</span>
    </div>
    <div class="toc-item">
      <span class="toc-num">04</span>
      <span class="toc-title">Fourth section</span>
    </div>
  </div>
</body>
</html>
