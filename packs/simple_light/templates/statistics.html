<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-elevated: #eeeeee;
    --text-primary: #000000;
    --text-secondary: #6b6b6b;
    --accent: #FC5E20;
    --border: #e0e0e0;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-primary);
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: 32pt;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 12pt;
  }
  .description {
    font-size: 16pt;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 32pt;
  }
  .metrics {
    display: flex;
    gap: 40pt;
    flex: 1;
  }
  .metric .number {
    font-size: 36pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1.0;
    margin-bottom: 8pt;
  }
  .metric h3 {
    font-size: 10pt;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-bottom: 4pt;
  }
  .metric p {
    font-size: 11pt;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <h2>Metrics</h2>
  <p class="description">Description about the data beside.</p>
  <div class="metrics">
    <div class="metric">
      <div class="number">61%</div>
      <h3>Metric 1</h3>
    </div>
    <div class="metric">
      <div class="number">56%</div>
      <h3>Metric 2</h3>
    </div>
    <div class="metric">
      <div class="number">55%</div>
      <h3>Metric 3</h3>
    </div>
    <div class="metric">
      <div class="number">48%</div>
      <h3>Metric 4</h3>
    </div>
  </div>
</body>
</html>
