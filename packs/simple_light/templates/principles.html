<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 64pt;
    --title-section: 44pt;
    --title-slide: 32pt;
    --text-subtitle: 20pt;
    --text-body: 16pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: var(--title-slide);
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 32pt;
  }
  .cards {
    display: flex;
    gap: 16pt;
    flex: 1;
  }
  .card {
    flex: 1;
    background: var(--bg-secondary);
    border-radius: 12pt;
    padding: 24pt;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card h3 {
    font-size: 14pt;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .card p {
    font-size: 14pt;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.6;
  }
</style>
</head>
<body>
  <h2>Principles</h2>
  <div class="cards">
    <div class="card">
      <h3>Principle 1</h3>
      <p>This is what we believe.</p>
    </div>
    <div class="card">
      <h3>Principle 2</h3>
      <p>It's how we make decisions.</p>
    </div>
    <div class="card">
      <h3>Principle 3</h3>
      <p>And what we aim to achieve.</p>
    </div>
  </div>
</body>
</html>
