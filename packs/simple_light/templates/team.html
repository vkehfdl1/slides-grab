<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 64pt;
    --title-section: 44pt;
    --title-slide: 32pt;
    --text-subtitle: 20pt;
    --text-body: 16pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
  }
  h2 {
    font-size: var(--title-slide);
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    text-align: center;
    margin-bottom: 32pt;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 20pt 16pt;
    flex: 1;
    align-content: start;
  }
  .member {
    text-align: center;
  }
  .avatar {
    width: 40pt;
    height: 40pt;
    border-radius: 50%;
    background: #f0f0f0;
    margin: 0 auto 8pt;
  }
  .name {
    font-size: var(--text-label);
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-bottom: 2pt;
  }
  .role {
    font-size: 9pt;
    font-weight: 500;
    color: #999;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <h2>Meet the team</h2>
  <div class="grid">
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
    <div class="member"><div class="avatar"></div><p class="name">Full Name</p><p class="role">Role</p></div>
  </div>
</body>
</html>
