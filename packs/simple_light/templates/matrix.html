<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 64pt;
    --title-section: 44pt;
    --title-slide: 32pt;
    --text-subtitle: 20pt;
    --text-body: 16pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    display: flex;
  }
  .text-side {
    width: 240pt;
    padding: 56pt 40pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .text-side h2 {
    font-size: 28pt;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 12pt;
  }
  .text-side p {
    font-size: 14pt;
    line-height: 1.6;
    color: var(--text-secondary);
  }
  .matrix-side {
    flex: 1;
    padding: 40pt;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3pt;
    width: 280pt;
    height: 260pt;
  }
  .cell {
    background: var(--bg-secondary);
    border-radius: 8pt;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text-primary);
  }
  .axis-label {
    font-size: 9pt;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.02em;
    position: absolute;
  }
  .axis-top { top: 24pt; }
  .axis-bottom { bottom: 24pt; }
  .axis-left { left: 20pt; transform: rotate(-90deg); }
  .axis-right { right: 20pt; transform: rotate(-90deg); }
</style>
</head>
<body>
  <div class="text-side">
    <h2>2 × 2 Matrix</h2>
    <p>Show where a few concepts live on 2 different scales.</p>
  </div>
  <div class="matrix-side">
    <span class="axis-label axis-top">Label</span>
    <span class="axis-label axis-bottom">Label</span>
    <span class="axis-label axis-left">Label</span>
    <span class="axis-label axis-right">Label</span>
    <div class="grid">
      <div class="cell">Label</div>
      <div class="cell">Label</div>
      <div class="cell">Label</div>
      <div class="cell">Label</div>
    </div>
  </div>
</body>
</html>
