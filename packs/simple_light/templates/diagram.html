<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-elevated: #eeeeee;
    --text-primary: #000000;
    --text-secondary: #6b6b6b;
    --accent: #FC5E20;
    --border: #e0e0e0;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-primary);
    display: flex;
  }
  .text-side {
    width: 240pt;
    padding: 56pt 40pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .text-side h2 {
    font-size: 28pt;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 12pt;
  }
  .text-side p {
    font-size: 14pt;
    line-height: 1.6;
    color: var(--text-secondary);
  }
  .diagram-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32pt;
  }
  .diagram-placeholder {
    width: 100%;
    height: 100%;
    background: var(--bg-secondary);
    border-radius: 8pt;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: 11pt;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="text-side">
    <h2>Diagram</h2>
    <p>Show how a few concepts relate to one another.</p>
  </div>
  <div class="diagram-area">
    <div class="diagram-placeholder">Diagram / Visual</div>
  </div>
</body>
</html>
