<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f5;
    --bg-elevated: #eeeeee;
    --text-primary: #000000;
    --text-secondary: #6b6b6b;
    --accent: #FC5E20;
    --border: #e0e0e0;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-primary);
    display: flex;
  }
  .left {
    flex: 1;
    padding: 56pt 40pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .left h2 {
    font-size: 24pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.5pt;
    margin-bottom: 12pt;
  }
  .left p {
    font-size: 11pt;
    line-height: 1.6;
    color: var(--text-secondary);
  }
  .right {
    flex: 1;
    padding: 56pt 40pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .right h2 {
    font-size: 24pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.5pt;
    margin-bottom: 12pt;
  }
  .right p {
    font-size: 11pt;
    line-height: 1.6;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <div class="left">
    <h2>Left column</h2>
    <p>Add a quick description of each thing, with enough context to understand what's up.</p>
  </div>
  <div class="right">
    <h2>Right column</h2>
    <p>Keep 'em short and sweet, so they're easy to scan and remember.</p>
  </div>
</body>
</html>
